{id:"heat-temp",title:"Heat & Temperature",subtitle:"Thermoregulation & Heat Transfer",icon:"🌡️",color:"#E65100",accentLight:"#FFE0B2",
notes:[
{heading:"Heat, Energy & Temperature",
summary:["Heat is a form of energy — produced by chemical reactions and mechanical work in the body.","Temperature is a measure of 'hotness' or 'coldness' — measured in Celsius (°C) in nursing/science.","Normal body temperature ≈ 37°C, maintained within 35.8–38.2°C range.","This temperature is vital for cell function, especially enzyme activity.","A 1°C increase in body temp = approximately 10% increase in enzymatic activity.","Balance between heat production and heat loss maintains homeostasis."],
detailed:["Heat is a form of energy that is produced as a byproduct of metabolic processes in the body. All chemical reactions (metabolism) produce some heat. The body must maintain a careful balance between heat production and heat loss to keep internal temperature within a safe range.","Temperature is the measurement of how hot or cold something is. In nursing and scientific contexts, the Celsius scale is used: water freezes at 0°C and boils at 100°C. Body temperature is measured using thermometers — oral, tympanic (ear), axillary (armpit), or rectal.","Normal body temperature is approximately 37°C, but is maintained within a range of 35.8–38.2°C. This narrow range is critical because enzymes — the proteins that catalyse virtually every chemical reaction in the body — are highly sensitive to temperature changes. A rise of just 1°C increases enzymatic activity by roughly 10%. This is why fever can speed up metabolic processes, and why extreme temperatures (too high or too low) can be fatal — enzymes denature or become sluggish.","The body maintains temperature homeostasis through a balance: heat production on one side, heat loss on the other. When these are equal, body temperature remains stable. When production exceeds loss, temperature rises. When loss exceeds production, temperature falls."]},
{heading:"Core vs Shell Temperature",
summary:["Core temperature: internal organs — precisely regulated, relatively constant.","Shell temperature: skin and body surface — varies considerably with the environment.","Blood is the agent of heat exchange between core and shell.","If shell temp > environment temp → heat is lost from the body.","Rectal temperature gives the best indication of core temperature.","Temperature can be taken: orally, tympanically (ear), axillary (armpit), rectally."],
detailed:["The body has two thermal zones. The core refers to the internal organs (brain, heart, liver, abdominal organs) where temperature is precisely regulated and remains relatively constant at around 37°C. The shell refers to the skin and superficial tissues, where temperature can vary considerably depending on environmental conditions — skin temperature can range from 20°C in cold conditions to 40°C in hot conditions.","Blood serves as the heat transport medium between core and shell. When the body needs to lose heat, blood is directed toward the skin surface (vasodilation) where heat can dissipate. When heat must be conserved, blood is shunted away from the skin (vasoconstriction), keeping warmth in the core.","Heat flows from warmer to cooler areas. If the shell (skin) temperature is higher than the surrounding environment, heat will flow outward from the body — this is net heat loss. If the environment is warmer than the skin, the body will absorb heat.","Different measurement sites give different readings. Rectal temperature most closely reflects core temperature because the rectum is well-insulated from the environment. Oral temperature is slightly lower than core (by ~0.3–0.6°C). Axillary is the least accurate (lower by ~0.5–1°C). Tympanic (ear) measurements are quick and reasonably accurate as the eardrum shares blood supply with the hypothalamus."]},
{heading:"Heat Production",
summary:["Heat is produced by: chemical reactions (thermogenesis), muscular activity, and metabolic processes.","Metabolic rate: a measure of heat produced by chemical reactions and mechanical work.","Basal Metabolic Rate (BMR): the 'energy cost of living' — minimum energy needed at rest.","BMR is affected by: body surface area, age, gender, stress, and hormones (especially thyroid).","Muscular activity is the biggest variable source of heat production — exercise can increase heat production 40-fold.","Thyroxine and epinephrine stimulate metabolic rate, increasing heat production."],
detailed:["The body produces heat through several mechanisms. Chemical thermogenesis refers to heat generated as a byproduct of all metabolic (chemical) reactions occurring in cells. Even at rest, the liver, brain, and heart produce significant amounts of heat. Muscular activity is the most variable and potent source of heat production — skeletal muscle contraction during exercise can increase heat production by up to 40 times the resting level. Even involuntary muscle contractions (shivering) can increase heat production by 3–5 times.","Metabolic rate is the overall measure of heat produced by the body through all its chemical reactions and mechanical work combined. The Basal Metabolic Rate (BMR) represents the minimum energy expenditure needed to sustain life — measured at complete rest, in a fasted state, at a comfortable temperature. BMR accounts for roughly 60–75% of daily energy expenditure.","Several factors affect BMR and heat production: Body surface area — larger people produce more total heat but smaller people produce more heat per kg. Age — BMR is highest in infancy and childhood (rapid growth), then decreases with age. Gender — males generally have higher BMR due to greater muscle mass. Stress — physical or emotional stress increases metabolic rate via sympathetic nervous system activation and hormones. Hormones — thyroxine (thyroid hormone) is the primary long-term regulator of metabolic rate; epinephrine (adrenaline) provides short-term boosts during stress or exercise.","A 1°C rise in body temperature increases metabolic rate by approximately 10%, which is why fever creates a positive feedback cycle if unchecked — higher temperature → faster metabolism → more heat produced → higher temperature."]},
{heading:"Methods of Heat Exchange",
summary:["Radiation — heat transfer by infrared (electromagnetic) waves. No contact needed. Most heat lost this way.","Conduction — heat transfer by direct physical contact between objects.","Convection — heat transfer by movement of air or fluid across a surface.","Evaporation — heat transfer through vaporisation of liquid (sweating). Very effective cooling.","Basal heat loss — continuous evaporation of water from lungs, oral mucosa, and skin (insensible perspiration)."],
images:[{src:"images/heat-production-vs-loss.jpg",caption:"Body temperature regulation — balance between heat production and heat loss mechanisms"}],
detailed:["RADIATION: The transfer of heat energy via infrared electromagnetic waves. No physical contact or medium is required — heat can radiate through empty space (vacuum). Most body heat is lost through radiation (about 50–60% at rest in a comfortable environment). Heat loss by radiation depends on the temperature difference between the body surface and surroundings. Clinical example: a patient lying uncovered in a cool room loses heat primarily through radiation. Black or dark surfaces are better radiators (emit more heat); shiny or white surfaces reflect heat. This is why emergency thermal blankets (space blankets) are shiny — they reflect radiated body heat back toward the patient.","CONDUCTION: The transfer of heat through direct physical contact — heat moves from a warmer object to a cooler one. In the body, heat is conducted through cells and fluids in a 'domino effect'. Clinical relevance: a cold stethoscope placed on a patient's chest draws heat away by conduction — warming it first shows awareness of this principle. Ice packs and warm compresses work primarily through conduction. A nurse can reduce conductive heat loss by providing warm blankets, clothing, and pre-warming equipment that contacts the patient.","CONVECTION: The transfer of heat by the movement of air or fluid. Warm air or fluid near the body rises and is replaced by cooler air/fluid, carrying heat away. A fan blowing across the skin, an open window creating a breeze, or swimming all increase convective heat loss. Forced-air warming blankets (e.g. Bair Hugger) use convection to warm hypothermic patients — warm air is blown across the body surface. Nurses can increase convection to cool a febrile patient (fan, light clothing, good ventilation) or decrease it to warm a cold patient (close windows, add blankets, reduce air currents).","EVAPORATION: The conversion of liquid water to water vapour, which requires energy (heat). This heat is drawn from the body surface, producing a cooling effect. Sweating is the primary evaporative cooling mechanism — eccrine sweat glands secrete sweat onto the skin surface, and as it evaporates, it carries heat away. Evaporation accounts for about 20–25% of heat loss and is the only mechanism that still works when the environment is hotter than the body. Basal (insensible) heat loss occurs continuously through evaporation of water from the lungs (during breathing), oral mucosa, and skin surface, even without visible sweating — this accounts for about 600–900 mL of water lost per day."]},
{heading:"Thermoregulation — The Hypothalamus",
summary:["The hypothalamus is the main thermoregulatory centre in the brain.","Contains: heat-promoting centre and heat-loss centre.","Receives input from: peripheral thermoreceptors (in skin) and central thermoreceptors (in core and hypothalamus).","Acts like a thermostat — compares blood temperature to a 'set point' and triggers appropriate responses.","When too hot: activates heat-loss centre → vasodilation, sweating, decreased metabolic rate.","When too cold: activates heat-promoting centre → vasoconstriction, shivering, piloerection, increased metabolic rate."],
images:[{src:"images/hypothalamus-control.jpg",caption:"The hypothalamus — main centre for body temperature control, receiving peripheral and central input"},{src:"images/heat-promoting-vs-loss-mechanisms.jpg",caption:"Heat-promoting mechanisms vs heat-loss mechanisms — the two sides of thermoregulation"},{src:"images/thermoregulation-feedback.jpg",caption:"Thermoregulation negative feedback loop — hypothalamus responding to temperature changes (Pg 988)"}],
detailed:["The hypothalamus, located in the diencephalon of the brain, is the body's thermostat. It contains two functional centres: a heat-promoting centre (activated when the body is too cold) and a heat-loss centre (activated when the body is too warm). These centres work in opposition through negative feedback to maintain core temperature near the set point of approximately 37°C.","The hypothalamus receives temperature information from two sources: (1) Peripheral thermoreceptors in the skin detect shell (surface) temperature and relay information via sensory nerves. These provide 'early warning' of environmental temperature changes. (2) Central thermoreceptors in the hypothalamus itself and in deep body tissues directly monitor core blood temperature. These are the primary regulators.","WHEN BLOOD IS WARMER THAN THE SET POINT (too hot): The heat-loss centre activates: vasodilation of dermal blood vessels brings warm blood to the skin surface where heat can radiate and conduct away. Eccrine sweat glands are stimulated, producing sweat for evaporative cooling. Metabolic rate and thyroxine secretion decrease to reduce internal heat production. Behavioural responses include seeking shade, removing clothing, drinking cold fluids. As body temperature falls back to normal, the heat-loss centre 'shuts off'.","WHEN BLOOD IS COOLER THAN THE SET POINT (too cold): The heat-promoting centre activates: vasoconstriction of dermal blood vessels diverts blood away from the skin surface, minimising heat loss. Shivering (involuntary skeletal muscle contractions) generates heat. Piloerection (goosebumps) traps an insulating layer of air near the skin. Metabolic rate increases — thyroxine and epinephrine secretion rise, stimulating cellular metabolism and heat production. Reduced sweating conserves heat. Behavioural responses include putting on clothing, seeking warmth, curling up. As body temperature rises back to normal, the heat-promoting centre 'shuts off'.","Note: shivering is a muscular (not integumentary) response. When a quiz asks about integumentary responses to cold, the correct answers are vasoconstriction and piloerection — not shivering."]},
{heading:"Temperature Imbalances",
summary:["Hypothermia: dangerously low body temperature from prolonged cold exposure.","Enzymes become sluggish → vital signs decrease → drowsiness → shivering stops at 30–32°C → death at ~21°C (cardiac arrest).","Hyperthermia: dangerously elevated body temperature → heat control fails at ~40.5°C → positive feedback → organ damage → death.","Fever (febrile state): controlled hyperthermia — hypothalamic set point is raised (usually by infection/pyrogens).","Fever stages: chill (vasoconstriction + shivering as core rises), plateau (new set point reached), defervescence (vasodilation + sweating as set point returns to normal).","Fever may actually be beneficial — inhibits bacterial growth and speeds healing."],
detailed:["HYPOTHERMIA: Occurs when core body temperature drops below 35°C, typically from prolonged exposure to cold environments, immersion in cold water, or in vulnerable populations (elderly, infants, intoxicated individuals). As temperature falls, enzymes become progressively less efficient ('sluggish'), slowing all metabolic processes. Heart rate, respiratory rate, and blood pressure all decrease. The person becomes drowsy and paradoxically comfortable — this is dangerous as it reduces the motivation to seek warmth. Shivering — the body's primary emergency heat-generating mechanism — exhausts itself and stops when core temperature reaches 30–32°C, meaning the last defence against further cooling is lost. Below 28°C, the risk of fatal cardiac arrhythmias increases dramatically. Death typically occurs at a core temperature of approximately 21°C due to cardiac arrest.","Infants are at particularly high risk of heat loss because they have a much larger body surface area relative to their weight compared to adults. This means they lose heat proportionally faster through radiation, convection, and evaporation. They also have less subcutaneous fat for insulation and an immature thermoregulatory system.","HYPERTHERMIA: Occurs when core temperature rises above 40°C. At approximately 40.5°C, the hypothalamic thermoregulatory mechanisms begin to fail — the heat-loss centre can no longer compensate. This triggers a dangerous positive feedback cycle: elevated temperature → increased metabolic rate (remember: +1°C = +10% metabolic activity) → more heat production → even higher temperature. Without intervention, this leads to protein denaturation, enzyme dysfunction, multiple organ damage, convulsions, and death. Heat stroke is a medical emergency requiring rapid external cooling.","FEVER (PYREXIA): Unlike hyperthermia, fever is a controlled, regulated elevation of body temperature. Pyrogens (fever-inducing substances — often from bacteria or immune cells) cause the hypothalamus to raise its temperature set point. The body then behaves as if its normal temperature is 'too cold': the heat-promoting centre activates, triggering vasoconstriction (which makes the skin feel cold and pale — 'chills') and shivering (rigors) as core temperature rises to the new set point. Once the new set point is reached, shivering stops and the person feels warm. When the infection is controlled and pyrogens decrease, the set point returns to normal — the body is now 'too hot' relative to the set point, so the heat-loss centre activates: vasodilation and sweating bring temperature back down (the 'breaking' of the fever). Moderate fever (up to ~39°C) may actually be beneficial: it inhibits bacterial reproduction, increases immune cell activity, and speeds tissue repair. However, very high or prolonged fevers are harmful and require treatment."]},
{heading:"Nursing Considerations",
summary:["Temperature assessment is a key vital sign — must be interpreted with other clinical findings.","Understanding heat transfer helps nurses manage patient temperature actively.","Reduce heat loss: warm blankets, clothing, close windows, pre-warm equipment, thermal blankets.","Increase heat loss: fans, light clothing, cool compresses, tepid sponging, good ventilation.","Warming metal objects (e.g. stethoscope) before patient contact demonstrates awareness of conduction.","Infrared lamps can relieve discomfort but require careful monitoring to prevent burns."],
detailed:["Assessment of body temperature is one of the fundamental vital signs in nursing practice. However, a temperature reading must always be interpreted in context alongside other clinical findings: heart rate, respiratory rate, blood pressure, skin colour and turgor, level of consciousness, and the patient's subjective symptoms.","PRACTICAL APPLICATIONS OF HEAT TRANSFER KNOWLEDGE: Conduction — pre-warming stethoscopes, placing warm blankets on patients, using warm IV fluids during surgery. A nurse who warms metal objects before placing them on a patient demonstrates understanding of conduction and provides more comfortable care. Ice packs and warm compresses are therapeutic applications of conduction. Convection — positioning patients away from drafts, closing windows in cold weather, using fans for febrile patients, or using forced-air warming devices (e.g. Bair Hugger) for hypothermic patients. Radiation — keeping patients covered to reduce radiant heat loss, using thermal/foil emergency blankets that reflect radiated heat back to the patient. Evaporation — tepid sponging to cool febrile patients, ensuring adequate hydration to support sweating, monitoring for dehydration in patients with high fevers.","INFRARED LAMPS: These therapeutic devices emit infrared radiation to provide warmth, relieve muscle discomfort, and reduce congestion. However, they carry a risk of burns, especially in patients with reduced sensation (neuropathy, sedation, or confusion). Frequent checks and careful observation are essential. Key considerations include: maintaining appropriate distance from the patient, monitoring skin colour and temperature, checking patient comfort regularly, and being aware of patients at increased risk (elderly, diabetics with neuropathy, sedated patients).","SPECIAL POPULATIONS: Infants require extra attention to thermoregulation due to their high surface area-to-weight ratio, thin subcutaneous fat, and immature temperature control. Elderly patients are also vulnerable due to reduced subcutaneous fat, decreased metabolic rate, reduced vasoconstriction capacity, and impaired sensation."]},
],
flashcards:[
{front:"What is the difference between heat and temperature?",back:"Heat is a form of energy produced by metabolic reactions. Temperature is the measure of hotness or coldness — it quantifies how much heat energy an object has."},
{front:"What is normal body temperature and its range?",back:"Approximately 37°C, maintained within 35.8–38.2°C."},
{front:"Why is body temperature so important?",back:"Enzymes are highly temperature-sensitive. A 1°C rise = ~10% increase in enzymatic activity. Extreme deviations cause enzyme dysfunction and death."},
{front:"What is the difference between core and shell temperature?",back:"Core: internal organs, precisely regulated (~37°C).\nShell: skin and surface, varies with environment.\nBlood transfers heat between them."},
{front:"Which measurement site best reflects core temperature?",back:"Rectal temperature — well-insulated from the environment."},
{front:"What is Basal Metabolic Rate (BMR)?",back:"The 'energy cost of living' — minimum energy needed to sustain life at rest. Accounts for 60–75% of daily energy expenditure."},
{front:"What factors affect BMR?",back:"Body surface area, age, gender, stress, and hormones (especially thyroxine and epinephrine)."},
{front:"Name the 4 methods of heat exchange",back:"1. Radiation (infrared waves, no contact)\n2. Conduction (direct physical contact)\n3. Convection (moving air/fluid)\n4. Evaporation (vaporisation of liquid)"},
{front:"How does radiation transfer heat?",back:"Via infrared electromagnetic waves — no physical contact needed. Heat travels through empty space. Most body heat (~50–60%) is lost this way at rest."},
{front:"How does conduction transfer heat?",back:"Through direct physical contact — heat flows from warmer to cooler objects. Like a 'domino effect' through cells and fluids."},
{front:"How does convection transfer heat?",back:"Through movement of air or fluid. Warm air rises from skin surface and is replaced by cooler air, carrying heat away. Fans and breezes increase convection."},
{front:"How does evaporation cool the body?",back:"Converting liquid sweat to water vapour requires energy (heat). This heat is drawn from the skin surface, producing cooling. Only method that works when environment > body temp."},
{front:"What is insensible (basal) heat loss?",back:"Continuous evaporation of water from lungs, oral mucosa, and skin — even without visible sweating. Loses ~600–900 mL water/day."},
{front:"What organ controls body temperature?",back:"The hypothalamus — contains a heat-promoting centre and a heat-loss centre. Acts as the body's thermostat."},
{front:"What happens when the body is too hot?",back:"Heat-loss centre activates: vasodilation, sweating, decreased metabolic rate, decreased thyroxine secretion, behavioural responses (seek shade, remove clothing)."},
{front:"What happens when the body is too cold?",back:"Heat-promoting centre activates: vasoconstriction, shivering, piloerection, increased metabolic rate, increased thyroxine/epinephrine, behavioural responses (add clothing, seek warmth)."},
{front:"What is hypothermia and when is it fatal?",back:"Core temp <35°C. Enzymes slow down, vital signs decrease, drowsiness. Shivering stops at 30–32°C. Death at ~21°C (cardiac arrest)."},
{front:"Why are infants at higher risk of heat loss?",back:"Larger body surface area relative to weight → proportionally faster heat loss through radiation/convection/evaporation. Also less subcutaneous fat and immature thermoregulation."},
{front:"What is the difference between hyperthermia and fever?",back:"Hyperthermia: uncontrolled temperature rise, thermoregulation fails at ~40.5°C → positive feedback → death.\nFever: controlled rise — hypothalamic set point is raised by pyrogens. Regulated and potentially beneficial."},
{front:"What are pyrogens?",back:"Fever-inducing substances (from bacteria or immune cells) that cause the hypothalamus to raise its temperature set point."},
{front:"What are the stages of fever?",back:"1. Chill/onset: vasoconstriction + shivering as core rises to new set point\n2. Plateau: new set point reached, feels warm\n3. Defervescence: set point returns to normal, vasodilation + sweating ('breaking' of fever)"},
{front:"Why might fever be beneficial?",back:"Moderate fever inhibits bacterial growth, increases immune cell activity, and speeds tissue repair."},
{front:"How does a Bair Hugger (forced-air warming blanket) work?",back:"It uses convection — warm air is blown across the patient's body surface to transfer heat."},
{front:"Why should a nurse warm a stethoscope before use?",back:"A cold metal stethoscope draws heat from the patient by conduction. Warming it first prevents discomfort and shows awareness of heat transfer."},
{front:"Why are emergency foil blankets shiny?",back:"Shiny/reflective surfaces are poor radiators — they reflect the patient's radiated body heat back toward them, reducing heat loss by radiation."},
{front:"What is the main source of variable heat production?",back:"Muscular activity — exercise can increase heat production up to 40 times resting levels. Shivering increases it 3–5 times."}
],
questions:[
{q:"Which method of heat transfer occurs when heat moves directly from one object to another through physical contact?",options:["radiation","conduction","evaporation","convection"],answer:1,explanation:"Conduction is heat transfer through direct physical contact — heat flows from the warmer object to the cooler one."},
{q:"A nurse applies a warm compress directly to a patient's lower back to relieve muscle pain. Which method of heat transfer is primarily involved?",options:["evaporation","convection","radiation","conduction"],answer:3,explanation:"The warm compress is in direct physical contact with the patient's skin — this is conduction."},
{q:"Heat loss that occurs when air or fluid moves across the surface of the skin is known as",options:["metabolism","convection","conduction","radiation"],answer:1,explanation:"Convection is heat transfer by the movement of air or fluid across a surface — carrying heat away from the body."},
{q:"Which nursing intervention best demonstrates convection as a method of heat loss?",options:["Applying an ice pack to the skin","Applying an ice pack to the skin","Leaving a patient uncovered near an open window","Using a reflective foil blanket"],answer:2,explanation:"An open window creates air movement (convection currents) across the patient's body, carrying heat away. Ice packs = conduction; foil blankets = reducing radiation."},
{q:"Radiation refers to heat transfer that occurs",options:["through electromagnetic waves without direct contact","when moisture evaporates from the skin","through direct physical contact","only in cold environments"],answer:0,explanation:"Radiation is heat transfer via infrared electromagnetic waves — no physical contact or medium is needed."},
{q:"Which situation best illustrates radiation heat loss in a hospital setting?",options:["A patient receiving IV fluids at room temperature","A patient lying uncovered in a cool room","A patient sweating after exercise","A patient touching a cold metal bed rail"],answer:1,explanation:"An uncovered patient radiates infrared heat to the cooler surroundings without contact — this is radiation. Touching a bed rail = conduction; sweating = evaporation."},
{q:"Which mechanism of heat loss is most closely associated with sweating?",options:["secretion","evaporation","radiation","conduction"],answer:1,explanation:"Sweat on the skin surface absorbs heat energy as it vaporises (evaporates), cooling the body. Evaporation is the key cooling mechanism of sweating."},
{q:"Why is evaporation an effective method of reducing body temperature in a febrile patient?",options:["Skin temperature increases blood flow","Sweat insulates the body from heat","Heat is released when sweat dries on the skin","Water transports heat into the body"],answer:2,explanation:"When sweat evaporates (dries) on the skin, it absorbs heat energy from the body surface, cooling the patient. The phase change from liquid to gas requires energy."},
{q:"Infants are at higher risk of heat loss compared to adults primarily because they",options:["sweat excessively","have a larger body surface area relative to their weight","have thicker layers of subcutaneous fat","have slower metabolic rates"],answer:1,explanation:"Infants have a much larger surface area relative to their body weight/volume, meaning they lose heat proportionally faster through radiation, convection, and evaporation."},
{q:"A patient with hypothermia is rewarmed using a forced-air warming blanket (e.g. Bair Hugger). Which primary method of heat transfer does this intervention use?",options:["radiation","evaporation","conduction","convection"],answer:3,explanation:"A Bair Hugger blows warm air across the patient's body surface — this is convection (heat transfer by moving air)."}
]}
];

const SRS_KEY="srs_";
function loadSrs(id){try{return JSON.parse(localStorage.getItem(SRS_KEY+id));}catch{return null;}}
function saveSrs(id,d){try{localStorage.setItem(SRS_KEY+id,JSON.stringify(d));}catch{}}
function initSrs(id,n){const e=loadSrs(id);if(e&&e.length===n)return e;return Array.from({length:n},(_,i)=>({index:i,box:0,lastSeen:0,correctStreak:0}));}
function getDue(d){const now=Date.now(),iv=[0,6e4,3e5,864e5];return d.filter(c=>now-c.lastSeen>=iv[c.box]).sort((a,b)=>a.box-b.box||a.lastSeen-b.lastSeen);}
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

qCard:{background:"var(--surface)",borderRadius:16,padding:28,boxShadow:"var(--shadow)"},qTxt:{fontSize:"1.1rem",fontWeight:500,lineHeight:1.6,marginBottom:24,color:"var(--text)"},
opts:{display:"flex",flexDirection:"column",gap:10},opt:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:12,border:"2px solid var(--border)",background:"var(--bg)",textAlign:"left",fontSize:"0.9rem",color:"var(--text)"},optOk:{border:"2px solid #4CAF50",background:"var(--exp-ok-bg)",color:"var(--exp-ok-text)"},optNo:{border:"2px solid #E53935",background:"var(--exp-no-bg)",color:"var(--exp-no-text)"},optL:{width:30,height:30,borderRadius:8,background:"var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:"0.8rem",flexShrink:0,color:"var(--text)"},optT:{flex:1,lineHeight:1.5},chk:{color:"#4CAF50",fontWeight:700,fontSize:"1.1rem"},cross:{color:"#E53935",fontWeight:700,fontSize:"1.1rem"},

};

function ProgressRing({percent,size=80,stroke=6,color}){const r=(size-stroke)/2,c=2*Math.PI*r,o=c-(percent/100)*c;return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.8s ease"}}/></svg>;}

function HomeView({topics,onStudy,onFlash,onQuiz}){return <div style={S.box}><header style={S.heroWrap}><div style={S.heroTag}>Health Science 1</div><h1 style={S.heroH}>Continuous Test 2</h1><p style={S.heroP}>Review notes, drill flashcards, or test yourself</p></header>{topics.map(t=><div key={t.id} style={{...S.card,borderTop:`4px solid ${t.color}`}}><div style={S.icon}>{t.icon}</div><h2 style={S.cardT}>{t.title}</h2><p style={S.cardS}>{t.subtitle}</p><div style={S.pills}><span style={S.pill}>{t.notes.length} sections</span><span style={S.pill}>{(t.flashcards||[]).length} cards</span><span style={S.pill}>{t.questions.length} questions</span></div><div style={S.acts}><button style={{...S.bp,background:t.color}} onClick={()=>onStudy(t)}>📖 Notes</button><button style={{...S.bf,background:t.accentLight,color:t.color}} onClick={()=>onFlash(t)}>🃏 Cards</button><button style={{...S.bs,color:t.color,borderColor:t.color}} onClick={()=>onQuiz(t)}>✏️ Quiz</button></div></div>)}<footer style={S.foot}><p style={S.footT}>Edit the <code>TOPICS</code> array in <code>index.html</code> to add topics</p></footer></div>;}

function StudyView({topic,onBack,onQuiz}){const [sec,setSec]=useState(0);const [detail,setDetail]=useState(false);const ref=useRef(null);useEffect(()=>{if(ref.current)ref.current.scrollTo({top:0,behavior:"smooth"});},[sec,detail]);const n=topic.notes[sec],content=detail?(n.detailed||n.summary):n.summary,imgs=n.images||[];return <div style={S.box}><nav style={S.nav}><button onClick={onBack} style={S.back}>← Back</button><button onClick={onQuiz} style={{...S.bp,background:topic.color,padding:"8px 20px",fontSize:"0.85rem",flex:"none"}}>Take Quiz →</button></nav><div style={S.hdr}><span style={{fontSize:"2.5rem"}}>{topic.icon}</span><div><h1 style={S.hdrT}>{topic.title}</h1><p style={S.hdrS}>{topic.subtitle}</p></div></div><div style={S.tabs}>{topic.notes.map((x,i)=><button key={i} onClick={()=>setSec(i)} style={{...S.tab,background:i===sec?topic.color:"transparent",color:i===sec?"#fff":"var(--text-secondary)",fontWeight:i===sec?600:400}}>{x.heading}</button>)}</div><div style={S.dtRow}><div style={S.dtToggle}><button onClick={()=>setDetail(false)} style={{...S.dtBtn,...(!detail?S.dtActive:{})}}> Summary</button><button onClick={()=>setDetail(true)} style={{...S.dtBtn,...(detail?S.dtActive:{})}}>Detailed</button></div><span style={{fontSize:"0.78rem",color:"var(--text-secondary)"}}>{content.length} points</span></div><div ref={ref} style={S.noteBox}><h2 style={{...S.noteH,color:topic.color}}>{n.heading}</h2>{content.map((p,i)=><div key={i} style={S.noteR}><div style={{...S.noteM,background:topic.accentLight,color:topic.color}}>{i+1}</div><p style={S.noteT}>{p}</p></div>)}{imgs.length>0&&<div style={{marginTop:24,borderTop:"1px solid var(--border)",paddingTop:20}}><div style={{fontSize:"0.75rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text-secondary)",marginBottom:12}}>📷 Lecture Diagrams</div>{imgs.map((img,i)=><div key={i} style={{marginBottom:16}}><img src={img.src} alt={img.caption} style={{width:"100%",borderRadius:10,border:"1px solid var(--border)"}} /><p style={{fontSize:"0.8rem",color:"var(--text-secondary)",marginTop:6,fontStyle:"italic"}}>{img.caption}</p></div>)}</div>}</div><div style={S.arrows}><button disabled={sec===0} onClick={()=>setSec(sec-1)} style={{...S.arw,opacity:sec===0?0.3:1}}>← Previous</button><span style={S.cnt}>{sec+1}/{topic.notes.length}</span>{sec<topic.notes.length-1?<button onClick={()=>setSec(sec+1)} style={S.arw}>Next →</button>:<button onClick={onQuiz} style={{...S.bp,background:topic.color,padding:"10px 24px",flex:"none"}}>Take Quiz →</button>}</div></div>;}

const BOX_L=["New","Learning","Reviewing","Mastered"],BOX_C=["#78909C","#F57C00","#1565C0","#2E7D32"];
function FlashView({topic,onBack}){const cards=topic.flashcards||[];const [srs,setSrs]=useState(()=>initSrs(topic.id,cards.length));const [due,setDue]=useState([]);const [ci,setCi]=useState(0);const [flip,setFlip]=useState(false);const [done,setDone]=useState(false);const [stats,setStats]=useState({seen:0,got:0,miss:0});useEffect(()=>{const d=getDue(srs);if(!d.length)setDone(true);else{setDue(d);setCi(0);setFlip(false);}},[]);const cur=due[ci],cc=cur?cards[cur.index]:null;const bc=[0,0,0,0];srs.forEach(c=>bc[c.box]++);const rate=ok=>{const u=[...srs],c={...u[cur.index]};c.lastSeen=Date.now();if(ok){c.correctStreak++;c.box=Math.min(c.box+1,3);}else{c.correctStreak=0;c.box=Math.max(c.box-1,0);}u[cur.index]=c;setSrs(u);saveSrs(topic.id,u);setStats(p=>({seen:p.seen+1,got:ok?p.got+1:p.got,miss:ok?p.miss:p.miss+1}));if(ci+1>=due.length)setDone(true);else{setCi(ci+1);setFlip(false);}};const reset=()=>{const f=Array.from({length:cards.length},(_,i)=>({index:i,box:0,lastSeen:0,correctStreak:0}));setSrs(f);saveSrs(topic.id,f);setDue(getDue(f));setCi(0);setFlip(false);setDone(false);setStats({seen:0,got:0,miss:0});};return <div style={S.box}><nav style={S.nav}><button onClick={onBack} style={S.back}>← Back</button><span style={S.qCnt}>🃏 Flashcards</span></nav><div style={S.hdr}><span style={{fontSize:"2.5rem"}}>{topic.icon}</span><div><h1 style={S.hdrT}>{topic.title}</h1><p style={S.hdrS}>{cards.length} cards · Spaced repetition</p></div></div><div style={S.srsRow}>{BOX_L.map((l,i)=><div key={i} style={S.srsStat}><div style={{...S.srsNum,color:BOX_C[i]}}>{bc[i]}</div><div style={S.srsLbl}>{l}</div></div>)}</div>{done?<div style={S.done}>{stats.seen>0?<><div style={{fontSize:"2.5rem",marginBottom:12}}>🎉</div><h2 style={S.doneT}>Session Complete</h2><p style={{fontSize:"0.95rem",marginBottom:8,color:"var(--text)"}}>Reviewed: <strong>{stats.seen}</strong> · Got it: <strong style={{color:"#4CAF50"}}>{stats.got}</strong> · Needs work: <strong style={{color:"#E53935"}}>{stats.miss}</strong></p><p style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:24}}>Come back later for due cards.</p></>:<><div style={{fontSize:"2.5rem",marginBottom:12}}>✅</div><h2 style={S.doneT}>No cards due</h2><p style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:24}}>All caught up!</p></>}<div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}><button onClick={reset} style={{...S.bs,color:topic.color,borderColor:topic.color,flex:"none",padding:"12px 24px"}}>🔄 Reset All</button><button onClick={onBack} style={{...S.bp,background:topic.color,flex:"none",padding:"12px 24px"}}>🏠 Home</button></div></div>:cc?<><div style={S.pTrack}><div style={{...S.pFill,width:`${((ci+1)/due.length)*100}%`,background:topic.color}}/></div><div style={{textAlign:"center",color:"var(--text-secondary)",fontSize:"0.85rem",marginBottom:16}}>Card {ci+1} of {due.length}</div><div onClick={()=>setFlip(!flip)} style={{...S.fc,borderColor:flip?topic.color:"var(--border)"}}>{!flip?<div style={S.fcIn}><div style={S.fcLbl}>Question</div><p style={S.fcTxt}>{cc.front}</p><div style={S.fcHint}>Tap to flip</div></div>:<div style={S.fcIn}><div style={{...S.fcLbl,color:topic.color}}>Answer</div><p style={S.fcTxt}>{cc.back.split("\n").map((l,i)=><span key={i}>{l}{i<cc.back.split("\n").length-1&&<br/>}</span>)}</p><div style={S.fcHint}>Tap to flip back</div></div>}</div><div style={S.rRow}><button onClick={e=>{e.stopPropagation();rate(false);}} style={S.rMiss}>✕ Needs Work</button><button onClick={e=>{e.stopPropagation();rate(true);}} style={{...S.rGot,background:topic.color}}>✓ Got It</button></div></>:null}</div>;}

function QuizView({state,setState,onFinish,onBack}){const{topic,questions:qs,current:ci,answers:ans,showExplanation:se}=state;const q=qs[ci],sel=ans[ci],ha=sel!==undefined,ok=ha&&sel===q.answer,prog=((ci+1)/qs.length)*100;const pick=i=>{if(ha)return;const a=[...ans];a[ci]=i;setState({...state,answers:a,showExplanation:true});};const next=()=>{if(ci+1>=qs.length)onFinish();else setState({...state,current:ci+1,showExplanation:false});};return <div style={S.box}><nav style={S.nav}><button onClick={onBack} style={S.back}>✕ Exit</button><span style={S.qCnt}>{ci+1}/{qs.length}</span></nav><div style={S.pTrack}><div style={{...S.pFill,width:`${prog}%`,background:topic.color}}/></div><div style={S.qCard}><p style={S.qTxt}>{q.q}</p><div style={S.opts}>{q.options.map((o,i)=>{let st={...S.opt};if(ha){if(i===q.answer)st={...st,...S.optOk};else if(i===sel&&!ok)st={...st,...S.optNo};else st={...st,opacity:0.4};}return <button key={i} onClick={()=>pick(i)} style={st} disabled={ha}><span style={S.optL}>{String.fromCharCode(65+i)}</span><span style={S.optT}>{o}</span>{ha&&i===q.answer&&<span style={S.chk}>✓</span>}{ha&&i===sel&&!ok&&i!==q.answer&&<span style={S.cross}>✕</span>}</button>;})}</div>{se&&<div style={{...S.expBox,borderColor:ok?"#4CAF50":"#E53935",background:ok?"var(--exp-ok-bg)":"var(--exp-no-bg)"}}><div style={{fontWeight:700,marginBottom:6,color:ok?"var(--exp-ok-text)":"var(--exp-no-text)",fontSize:"0.95rem"}}>{ok?"✓ Correct!":"✕ Incorrect"}</div><p style={{margin:0,fontSize:"0.9rem",lineHeight:1.6,color:"var(--text)"}}>{q.explanation}</p></div>}{ha&&<button onClick={next} style={{...S.bp,background:topic.color,width:"100%",marginTop:16,padding:14}}>{ci+1>=qs.length?"See Results":"Next Question →"}</button>}</div></div>;}

function ResultsView({state,onRetry,onHome}){const{topic,questions:qs,answers:ans}=state;const cor=ans.filter((a,i)=>a===qs[i].answer).length,pct=Math.round(cor/qs.length*100);const[sr,setSr]=useState(false);let msg="Keep studying 💪";if(pct>=90)msg="Outstanding! 🌟";else if(pct>=70)msg="Great work! 👏";else if(pct>=50)msg="Good effort! 📚";return <div style={S.box}><div style={S.resCard}><h2 style={{...S.resT,color:topic.color}}>{topic.icon} Quiz Complete</h2><div style={S.sCirc}><ProgressRing percent={pct} size={120} stroke={8} color={topic.color}/><div style={S.sOver}><span style={S.sNum}>{pct}%</span></div></div><p style={S.sDetail}>{cor}/{qs.length} correct</p><p style={S.sMsg}>{msg}</p><div style={S.resActs}><button onClick={onRetry} style={{...S.bp,background:topic.color,flex:"none",padding:"12px 24px"}}>🔄 Retry</button><button onClick={onHome} style={{...S.bs,flex:"none",padding:"12px 24px",borderColor:"var(--border)",color:"var(--text)"}}>🏠 Home</button></div><button onClick={()=>setSr(!sr)} style={{...S.revTog,color:topic.color}}>{sr?"Hide Review ▲":"Review Answers ▼"}</button>{sr&&<div style={S.revList}>{qs.map((q,i)=>{const w=ans[i]===q.answer;return <div key={i} style={{...S.revItem,borderLeft:`4px solid ${w?"#4CAF50":"#E53935"}`}}><div style={S.revQ}><span style={{...S.revBadge,background:w?"var(--exp-ok-bg)":"var(--exp-no-bg)",color:w?"var(--exp-ok-text)":"var(--exp-no-text)"}}>{w?"✓":"✕"} Q{i+1}</span><span style={S.revQT}>{q.q}</span></div>{!w&&<div style={S.revA}><div style={{color:"var(--exp-no-text)",fontSize:"0.85rem"}}>Your answer: {q.options[ans[i]]}</div><div style={{color:"var(--exp-ok-text)",fontSize:"0.85rem",fontWeight:600}}>Correct: {q.options[q.answer]}</div></div>}<p style={S.revE}>{q.explanation}</p></div>;})}</div>}</div></div>;}

function App(){const[theme,setTheme]=useState(()=>{try{return localStorage.getItem("theme")||"light";}catch{return"light";}});const[view,setView]=useState("home");const[topic,setTopic]=useState(null);const[qs,setQs]=useState(null);useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);try{localStorage.setItem("theme",theme);}catch{}},[theme]);const goHome=()=>{setView("home");setTopic(null);setQs(null);};const startQuiz=t=>{const sh=shuffle(t.questions).map(q=>{const oa=q.options[q.answer],so=shuffle(q.options);return{...q,options:so,answer:so.indexOf(oa)};});setQs({topic:t,questions:sh,current:0,answers:[],showExplanation:false});setView("quiz");};return <div style={S.app}><button style={S.themeBtn} onClick={()=>setTheme(theme==="light"?"dark":"light")}>{theme==="light"?"🌙":"☀️"}</button>{view==="home"&&<HomeView topics={TOPICS} onStudy={t=>{setTopic(t);setView("study");}} onFlash={t=>{setTopic(t);setView("flash");}} onQuiz={startQuiz}/>}{view==="study"&&topic&&<StudyView topic={topic} onBack={goHome} onQuiz={()=>startQuiz(topic)}/>}{view==="flash"&&topic&&<FlashView topic={topic} onBack={goHome}/>}{view==="quiz"&&qs&&<QuizView state={qs} setState={setQs} onFinish={()=>setView("results")} onBack={goHome}/>}{view==="results"&&qs&&<ResultsView state={qs} onRetry={()=>startQuiz(qs.topic)} onHome={goHome}/>}</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
