const TOPICS=[{id:"blood",title:"Blood",subtitle:"A Specialised Connective Tissue",icon:"🩸",color:"#C62828",accentLight:"#FFCDD2",
notes:[
{heading:"Why Blood is a Connective Tissue",
summary:["Blood originates from mesenchyme (common embryonic origin with other connective tissues).","It contains living cells (formed elements — 45%) and a non-living extracellular fluid matrix called plasma (55%).","Fibres (fibrin) appear only during blood clotting.","Total blood volume: 4–6 litres (≈ 8% of body weight). Slightly alkaline pH of 7.35–7.45."],
images:[{src:"images/connective-tissue-chart.jpg",caption:"Connective tissue classification — all types originate from mesenchyme (Pg 128)"},{src:"images/blood-components.jpg",caption:"Blood components after centrifugation — plasma 55%, buffy coat <1%, erythrocytes 45% (Pg 647)"}],
detailed:["Blood is classified as a connective tissue because it shares the same embryonic origin as other connective tissues — they all develop from mesenchyme, which itself derives from the mesoderm germ layer. The four classes of connective tissue that arise from mesenchyme are: connective tissue proper, cartilage, osseous (bone), and blood.","Like all connective tissues, blood has three key components: (1) living cells — called formed elements, making up about 45% of blood volume; (2) a non-living extracellular matrix — which in blood's case is a fluid called plasma, making up about 55%; and (3) fibres — though in blood, fibres (fibrin) only become visible during clotting.","What makes blood unique among connective tissues is that its matrix is liquid rather than solid or gel-like. This allows blood to flow through the cardiovascular system and perform its transport, protection, and regulatory roles.","An average adult has 4–6 litres of blood, which accounts for roughly 8% of their body weight. Blood is a red, sticky, viscous, salty fluid with a salt concentration of about 0.9% sodium chloride. It is slightly alkaline, maintained within the narrow pH range of 7.35–7.45. Deviations outside this range can be life-threatening.","When blood is withdrawn and placed in a centrifuge, it separates into three layers: plasma on top (55%), a thin buffy coat of leukocytes and platelets in the middle (<1%), and erythrocytes at the bottom (45%). The percentage of blood volume occupied by RBCs is known as the haematocrit."]},
{heading:"Functions of Blood",
summary:["Transport — carries gases (O₂ & CO₂), nutrients, and wastes.","Protection — defends against infection and blood loss.","Regulation — maintains water content, blood pressure, acid/base balance (pH), and body temperature."],
detailed:["Blood performs three broad categories of functions: transport, protection, and regulation. Understanding these helps explain why blood disorders can have such widespread effects on the body.","TRANSPORT: Blood is the body's primary transport medium. It carries oxygen from the lungs to every cell and returns carbon dioxide to the lungs for exhalation. It transports nutrients absorbed from the digestive tract (glucose, amino acids, fatty acids, vitamins) to cells for energy and growth. Metabolic wastes — urea, uric acid, creatinine — are carried to the kidneys and liver for excretion. Hormones are also transported via blood to their target organs.","PROTECTION: White blood cells identify and destroy invading pathogens. Plasma proteins called antibodies mark foreign substances for destruction. Platelets and clotting factors prevent blood loss through haemostasis when vessels are damaged.","REGULATION: Blood regulates body temperature by absorbing heat from active areas and redistributing it. It maintains water balance through osmotic pressure exerted by plasma proteins (especially albumin). Blood buffers — albumin, haemoglobin, bicarbonate ions — maintain the critical pH range of 7.35–7.45. Blood pressure is partly regulated by blood volume and vessel constriction/dilation."]},
{heading:"Plasma",
summary:["Plasma is 90% water, 8% proteins, and 2% other solutes.","Key proteins: Albumin (60%, osmotic pressure & pH buffer), Globulins (36%, transport & antibodies), Clotting proteins (4%, fibrinogen & prothrombin).","Also carries electrolytes, nutrients, respiratory gases, and nitrogenous waste products."],
images:[{src:"images/plasma-composition.jpg",caption:"Composition of plasma — proteins, solutes, and their functions (Pg 649)"}],
detailed:["Plasma is the straw-coloured, non-living fluid matrix of blood, making up approximately 55% of whole blood volume. It is about 90% water, which serves as a dissolving and suspending medium for blood solutes and absorbs heat.","PLASMA PROTEINS (8%): Mostly produced by the liver. Albumin (about 60%) — the smallest and most abundant plasma protein. Critical for maintaining osmotic pressure, keeping water in blood vessels. Also acts as a pH buffer (absorbing/releasing H⁺ ions) and a transport protein for fatty acids, hormones, and some drugs.","Globulins (about 36%): Alpha and beta globulins (produced by liver) transport lipids, metal ions, and fat-soluble vitamins. Gamma globulins are antibodies (immunoglobulins) produced by plasma cells (activated B-lymphocytes).","Clotting proteins (about 4%) include fibrinogen and prothrombin, both produced by the liver. Fibrinogen is the precursor protein that gets converted into insoluble fibrin threads during clot formation.","OTHER SOLUTES (2%): Electrolytes (sodium, potassium, calcium, chloride, bicarbonate, phosphate), nutrients (glucose, amino acids, fatty acids, vitamins), respiratory gases (O₂ and CO₂), and nitrogenous waste products (urea, uric acid, creatinine, ammonium salts)."]},
{heading:"Erythrocytes (RBCs)",
summary:["Biconcave disc shape — increases surface area for gas exchange.","Anucleate — allows more room for haemoglobin (97% of cell). Can't divide, limited lifespan.","No mitochondria — all O₂ is delivered to other cells ('unselfish').","Primary function: transport O₂ and some CO₂.","Haemoglobin: 4 polypeptide chains with iron-containing heme groups.","RBC lifespan ≈ 120 days. Destroyed primarily in the spleen."],
images:[{src:"images/haemoglobin-structure.jpg",caption:"Structure of haemoglobin — 4 polypeptide chains with iron-containing heme groups (Pg 651)"},{src:"images/rbc-destruction.jpg",caption:"Erythrocyte destruction — spleen, liver, bone marrow; haemoglobin breakdown pathway (Pg 652)"},{src:"images/blood-smear.jpg",caption:"Blood smear showing erythrocytes, neutrophils, lymphocyte, monocyte, and platelets (Pg 649)"}],
detailed:["Erythrocytes are the most abundant blood cells (4–6 million/μL). They are highly specialised for transporting oxygen from the lungs to body tissues, and carrying some CO₂ back.","SHAPE: Biconcave discs — thinner in the centre, thicker at edges. This increases surface area-to-volume ratio by ~30% compared to a sphere, allowing more efficient gas exchange. It also makes the cell flexible enough to squeeze through capillaries as small as 3μm (the RBC itself is 7–8μm).","ANUCLEATE: Mature RBCs have no nucleus (ejected during development). This adaptation provides more space for haemoglobin (~97% of dry weight). The trade-off: they cannot repair themselves, produce new proteins, or divide — giving them a limited ~120 day lifespan.","NO MITOCHONDRIA: RBCs generate ATP only through anaerobic glycolysis. Without mitochondria consuming oxygen, none of the carried O₂ is 'used up' for the cell's own energy — all is available for delivery. This is why RBCs are described as 'unselfish'.","HAEMOGLOBIN: Each RBC contains ~250 million haemoglobin molecules. Each has 4 polypeptide chains (2 alpha, 2 beta), each with an iron-containing heme group. Each heme binds one O₂ molecule (4 O₂ per haemoglobin). Oxyhaemoglobin = bright red; deoxyhaemoglobin = dark red. Haemoglobin also transports ~23% of CO₂ (as carbaminohaemoglobin) and acts as a pH buffer.","RBC DESTRUCTION: After ~120 days, old RBCs are destroyed by macrophages, primarily in the spleen (also liver and bone marrow). Haemoglobin breakdown: (1) Iron is salvaged and recycled for new haemoglobin; (2) Globin chains → amino acids returned to body pool; (3) Heme → biliverdin → bilirubin → transported to liver → secreted in bile → excreted in faeces (giving brown colour)."]},
{heading:"Erythropoiesis",
summary:["Production of RBCs occurs in red bone marrow.","Triggered by hypoxia → kidneys release EPO → stimulates bone marrow → more RBCs.","Pathway: Hemocytoblast → Proerythroblast → Early erythroblast → Late erythroblast → Normoblast → Reticulocyte → Erythrocyte.","Requires: protein, iron, vitamin B12, and folic acid."],
images:[{src:"images/erythropoiesis-feedback.jpg",caption:"Erythropoiesis negative feedback loop — hypoxia triggers EPO release from kidneys (Pg 653)"},{src:"images/erythropoiesis-pathway.jpg",caption:"RBC developmental pathway — stem cell to mature erythrocyte (Pg 652)"}],
detailed:["Erythropoiesis occurs in red bone marrow (flat bones: sternum, ribs, pelvis, vertebrae). The body produces ~2 million new RBCs every second to replace those being destroyed.","THE TRIGGER — HYPOXIA: Controlled by negative feedback. When kidneys detect low blood O₂ (from decreased RBC count, decreased O₂ availability, or increased tissue demand), they release erythropoietin (EPO). EPO stimulates bone marrow stem cells to increase RBC production. As O₂ delivery improves, EPO release slows down — completing the feedback loop.","DEVELOPMENTAL PATHWAY (5–7 days): Phase 1 — Ribosome synthesis: Hemocytoblast → Proerythroblast → Early erythroblast (ribosomes needed for haemoglobin protein synthesis). Phase 2 — Haemoglobin accumulation: → Late erythroblast → Normoblast (cell shrinks, colour shifts blue → red). Phase 3 — Nucleus ejection: → Reticulocyte (still has some ribosomes, lost within 1–2 days) → mature Erythrocyte.","NUTRITIONAL REQUIREMENTS: Iron — essential for heme groups. Sources: red meat, liver, beans, leafy greens. Absorbed in duodenum, transported by transferrin. Vitamin B12 and folic acid — needed for DNA synthesis during rapid cell division. B12 deficiency or folate deficiency → large, immature RBCs (megaloblastic anaemia). B12 absorption requires intrinsic factor from the stomach. Protein — needed for globin chain synthesis."]},
{heading:"Anaemia",
summary:["Caused by lack of RBCs or decreased quality/quantity of haemoglobin.","Causes: altered erythropoiesis, blood loss, inadequate iron, increased RBC destruction.","Symptoms: fatigue, breathlessness, pallor, increased heart rate.","Reduced blood volume → faster flow → cardiovascular strain."],
detailed:["Anaemia = deficiency in RBC number or decreased haemoglobin quality/quantity → reduced O₂-carrying capacity → tissue hypoxia.","CAUSES: (1) Altered erythropoiesis — nutritional deficiencies (iron-deficiency anaemia most common worldwide; B12/folate → megaloblastic anaemia), chronic kidney disease (reduced EPO), bone marrow disorders (aplastic anaemia, leukaemia). (2) Blood loss — acute (trauma, surgery) or chronic (heavy menstruation, GI bleeding). Chronic loss depletes iron stores. (3) Increased RBC destruction (haemolytic anaemias) — sickle cell disease, malaria, autoimmune disorders, transfusion reactions.","SYMPTOMS: Fatigue and low energy (insufficient O₂ for muscle ATP production), breathlessness (compensatory increased respiration), pallor (reduced haemoglobin = less red colour in skin/nail beds/mucous membranes), dizziness (brain sensitive to O₂ deprivation).","CARDIOVASCULAR EFFECTS: Reduced RBC volume → 'thinner' blood → flows faster → heart compensates with tachycardia (faster beating) → over time → cardiac strain, cardiomegaly, potential heart failure. Chronic anaemia is a systemic condition, not just a 'blood problem'."]},
{heading:"Leukocytes (WBCs)",
summary:["Nucleated cells, <1% of blood volume. Crucial to immunity.","Granulocytes: Neutrophils (50–70%), Eosinophils (2–4%), Basophils (0.5–1%).","Agranulocytes: Lymphocytes (25–45%), Monocytes (3–8%).","Properties: phagocytosis, amoeboid movement, diapedesis, chemotaxis."],
images:[{src:"images/wbc-development.jpg",caption:"Leukocyte developmental pathways — from hemocytoblast to all WBC types (Pg 661)"},{src:"images/formed-elements-table-1.jpg",caption:"Summary of formed elements — RBCs, Neutrophils, Eosinophils (Pg 658)"},{src:"images/formed-elements-table-2.jpg",caption:"Summary continued — Basophils, Lymphocytes, Monocytes, Platelets (Pg 658)"}],
detailed:["Leukocytes are complete cells with nuclei and organelles. <1% of blood volume (4,800–10,800/μL). Divided into granulocytes (visible cytoplasmic granules, lobed nuclei) and agranulocytes.","NEUTROPHILS (50–70%): Most abundant WBC. First responders to bacterial infection. Powerful phagocytes that engulf and digest bacteria. Short-lived (6 hours to days). Main component of pus. High count (neutrophilia) = bacterial infection.","EOSINOPHILS (2–4%): Red-staining granules, bilobed nucleus. Combat parasitic infections by releasing toxic enzymes onto parasite surfaces. Also modulate allergic reactions by inactivating inflammatory chemicals. Elevated count (eosinophilia) = parasites or allergy.","BASOPHILS (0.5–1%): Rarest WBC. Blue-purple granules. Release histamine (promotes inflammation/vasodilation) and heparin (anticoagulant). Central role in allergic/hypersensitivity reactions. When allergens bind to antibodies on basophil surfaces → degranulation → histamine release → allergic symptoms. This is why antihistamines work.","LYMPHOCYTES (25–45%): Cornerstone of adaptive immunity. T-cells = direct cell attack. B-cells → plasma cells = antibody production. NK cells = destroy virus-infected and cancer cells. Can live years/decades (memory cells) providing long-term immunity.","MONOCYTES (3–8%): Largest WBCs. Circulate 1–2 days, then migrate to tissues → become macrophages (powerful phagocytes). Also activate adaptive immunity by presenting antigens to T-cells.","SPECIAL PROPERTIES: (1) Phagocytosis — engulfing/digesting particles. (2) Amoeboid movement — extend pseudopods to crawl through tissues. (3) Diapedesis — squeeze between capillary wall cells to enter tissues. (4) Chemotaxis — follow chemical signals (cytokines, complement) toward infection/injury sites."]},
{heading:"Thrombocytes (Platelets)",
summary:["Very small cell fragments (not true cells).","Contain chemicals involved in blood clotting.","Pathway: Hemocytoblast → Megakaryoblast → Promegakaryocyte → Megakaryocyte → Platelets."],
images:[{src:"images/platelet-development.jpg",caption:"Platelet developmental pathway — megakaryocyte fragments into thousands of platelets (Pg 662)"}],
detailed:["Platelets are not true cells but cytoplasmic fragments from megakaryocytes in bone marrow. Only 2–4 μm diameter — smallest formed elements. Essential for haemostasis. Count: 150,000–400,000/μL. Lifespan: 5–10 days.","Platelets lack a nucleus but contain granules with: serotonin and thromboxane A2 (promote vasoconstriction), ADP and calcium ions (activate other platelets and clotting cascade), platelet-derived growth factor (PDGF — stimulates tissue repair).","THROMBOPOIESIS: Hemocytoblast → Megakaryoblast → Promegakaryocyte → Megakaryocyte. The megakaryocyte is a giant cell with a massive multi-lobed nucleus (repeated DNA replication without cell division). It extends cytoplasmic processes into blood sinusoids and thousands of platelet fragments break off. One megakaryocyte produces 2,000–3,000 platelets.","ACTIVATION: When vessels are damaged, platelets become activated — changing from smooth discs to spiky spheres. They become sticky, adhere to exposed collagen in vessel walls, release granule contents to recruit more platelets → forming a platelet plug (stage 2 of haemostasis)."]},
{heading:"Haemostasis (Prevention of Blood Loss)",
summary:["Stage 1 — Vascular spasm (vasoconstriction): vessel constricts.","Stage 2 — Platelet plug formation: platelets aggregate at injury.","Stage 3 — Coagulation: fibrinogen → fibrin clot mesh.","Stage 4 — Clot retraction: clot tightens, pulls wound edges.","Stage 5 — Fibrinolysis: clot dissolved once healed."],
images:[{src:"images/blood-clot-microscopic.jpg",caption:"Microscopic view of a blood clot — fibrin mesh trapping red blood cells (Pg 666)"}],
detailed:["Haemostasis = 'stopping of blood'. Five overlapping stages. Note: haemostasis (stopping bleeding) ≠ homeostasis (maintaining stable internal conditions).","STAGE 1 — VASCULAR SPASM: Immediate response. Smooth muscle in vessel wall contracts (vasoconstriction) → narrowed vessel → reduced blood flow (up to 90% reduction). Triggered by: direct smooth muscle injury, platelet chemicals, and pain receptor reflexes. Temporary — buys time for next stages.","STAGE 2 — PLATELET PLUG: Broken endothelium exposes underlying collagen → platelets adhere (platelet adhesion) → become activated (shape change) → release chemicals (ADP, thromboxane A2, serotonin) → attract and activate more platelets (platelet aggregation) → growing platelet plug blocks the break. Sufficient alone for small injuries.","STAGE 3 — COAGULATION: For larger injuries. Complex cascade of 30+ clotting factors (mostly liver-produced proteins, many requiring vitamin K). Cascade converts soluble fibrinogen → insoluble fibrin threads. Fibrin weaves through platelet plug, trapping RBCs and platelets → solid clot. Initiated via intrinsic and extrinsic pathways converging on a common pathway.","STAGE 4 — CLOT RETRACTION: Platelets within the clot contract (using actin/myosin), pulling fibrin threads tighter → draws vessel edges closer → stabilises clot. Serum (plasma minus clotting factors) is squeezed out.","STAGE 5 — FIBRINOLYSIS: Once vessel is repaired, plasmin (from plasminogen trapped in clot) gradually breaks down fibrin mesh → dissolves clot. Prevents permanent obstructions. Disorders of fibrinolysis → thrombosis (excessive clotting) or abnormal bleeding."]},
{heading:"Blood Groups & Transfusions",
summary:["ABO system: Type A (A antigens, anti-B), Type B (B antigens, anti-A), Type AB (both, no antibodies — universal recipient), Type O (none, both antibodies — universal donor).","Rhesus factor: Rh+ or Rh–. Universal donor = O–. Universal recipient = AB+.","Transfusion reactions: agglutination → clogged vessels → haemolysis → renal failure → death.","Rh incompatibility: Rh– mother + Rh+ baby → anti-Rh antibodies → haemolytic disease in future pregnancies."],
detailed:["Blood groups are based on antigens (glycoproteins/glycolipids) on RBC surfaces. Over 30 systems exist; the two most clinically important are ABO and Rhesus (Rh).","ABO SYSTEM: Type A = A antigens, anti-B antibodies. Type B = B antigens, anti-A antibodies. Type AB = both antigens, NO antibodies → universal recipient. Type O = NO antigens, BOTH antibodies → universal donor.","RHESUS (Rh) SYSTEM: Based on Rh D antigen presence (+) or absence (–). ~85% of people are Rh+. Unlike ABO, anti-Rh antibodies only develop after exposure to Rh+ blood (not naturally present). Combined with ABO → 8 blood types. True universal donor = O– (no antigens). True universal recipient = AB+ (all antigens, no antibodies).","TRANSFUSION REACTIONS: Incompatible blood → recipient's antibodies attack donor RBCs → agglutination (clumping) → blocked small vessels → haemolysis (RBC rupture) → free haemoglobin released → can clog kidneys → acute renal failure. Also: reduced O₂ capacity, inflammatory response, disseminated intravascular coagulation (DIC), shock, death. This is why blood typing and cross-matching are essential before every transfusion.","Rh INCOMPATIBILITY IN PREGNANCY: Rh– mother + Rh+ foetus (from Rh+ father). During delivery, foetal Rh+ cells may enter mother's blood → her immune system produces anti-Rh antibodies (sensitisation). First pregnancy usually unaffected. Subsequent Rh+ pregnancies → maternal IgG anti-Rh antibodies cross placenta → attack baby's RBCs → haemolytic disease of foetus and newborn (HDFN): mild jaundice to severe anaemia, heart failure, death. Prevention: RhoGAM (anti-D immunoglobulin) given at 28 weeks and within 72 hours of delivery — destroys foetal Rh+ cells before mother's immune system responds."]}
],
flashcards:[
{front:"What type of tissue is blood?",back:"A specialised connective tissue — originates from mesenchyme, has living cells, non-living matrix (plasma), and fibres (fibrin during clotting)."},
{front:"What percentage of blood is plasma vs formed elements?",back:"Plasma = 55%, Formed elements (cells) = 45%."},
{front:"What is the pH range of blood?",back:"7.35 – 7.45 (slightly alkaline)."},
{front:"What are the 3 main functions of blood?",back:"1. Transport (gases, nutrients, wastes)\n2. Protection (infection, blood loss)\n3. Regulation (water, BP, pH, temperature)"},
{front:"What is plasma made of?",back:"90% water, 8% proteins (albumin, globulins, fibrinogen), 2% other solutes."},
{front:"What does albumin do?",back:"Maintains osmotic pressure and acts as a pH buffer — absorbing or releasing H⁺ ions."},
{front:"What is fibrinogen?",back:"A soluble plasma protein converted into insoluble fibrin threads during coagulation. Precursor to clot fibres."},
{front:"What shape are erythrocytes and why?",back:"Biconcave discs — increases surface area for efficient gas exchange."},
{front:"Why are RBCs anucleate?",back:"More room for haemoglobin → maximises O₂ carrying capacity. Can't divide → limited lifespan."},
{front:"Why are RBCs 'unselfish'?",back:"No mitochondria → can't use O₂ for own respiration. All carried O₂ goes to other body cells."},
{front:"Structure of haemoglobin?",back:"4 polypeptide chains (2α, 2β), each with iron-containing heme group. Each heme binds 1 O₂ (4 total)."},
{front:"RBC lifespan and where destroyed?",back:"~120 days. Macrophages in spleen (also liver, bone marrow). Iron recycled, globin → amino acids, haem → bilirubin → bile."},
{front:"What triggers erythropoiesis?",back:"Hypoxia → kidneys release EPO → stimulates red bone marrow → more RBCs."},
{front:"Nutrients needed for erythropoiesis?",back:"Protein, iron, vitamin B12, and folic acid."},
{front:"RBC developmental pathway?",back:"Hemocytoblast → Proerythroblast → Early erythroblast → Late erythroblast → Normoblast → Reticulocyte → Erythrocyte"},
{front:"Causes of anaemia?",back:"Lack of RBCs or decreased haemoglobin. Causes: altered erythropoiesis, blood loss, inadequate iron, increased RBC destruction."},
{front:"Symptoms of anaemia?",back:"Fatigue, breathlessness, pallor, increased heart rate. Cardiovascular strain over time."},
{front:"Two main leukocyte groups?",back:"Granulocytes (neutrophils, eosinophils, basophils) and Agranulocytes (lymphocytes, monocytes)."},
{front:"Neutrophils — % and function?",back:"50–70%. Phagocytise bacteria. Most abundant WBC."},
{front:"Eosinophils — % and function?",back:"2–4%. Kill parasitic worms, inactivate inflammatory chemicals of allergy."},
{front:"Basophils — % and function?",back:"0.5–1%. Release histamine + inflammation mediators. Contain heparin. Allergic reactions."},
{front:"Lymphocytes — % and function?",back:"25–45%. Immune response: T-cells (direct attack), B-cells → plasma cells (antibodies), NK cells."},
{front:"Monocytes — % and function?",back:"3–8%. Phagocytosis. Become macrophages in tissues."},
{front:"4 special WBC properties?",back:"1. Phagocytosis\n2. Amoeboid movement\n3. Diapedesis (leave capillaries)\n4. Chemotaxis (follow chemical trails)"},
{front:"What are thrombocytes?",back:"Platelets — small cell fragments containing chemicals for blood clotting."},
{front:"5 stages of haemostasis?",back:"1. Vascular spasm\n2. Platelet plug formation\n3. Coagulation\n4. Clot retraction\n5. Fibrinolysis"},
{front:"First stage of haemostasis?",back:"Vascular spasm — vasoconstriction reduces blood flow to damaged area."},
{front:"ABO blood types?",back:"A: A antigens, anti-B antibodies\nB: B antigens, anti-A antibodies\nAB: both antigens, NO antibodies\nO: NO antigens, both antibodies"},
{front:"Universal donor and why?",back:"O– — no A, B, or Rh antigens. Won't trigger reactions in any recipient."},
{front:"Universal recipient and why?",back:"AB+ — all antigens, no ABO antibodies. Won't attack any donated blood."},
{front:"Transfusion reaction?",back:"Incompatible blood → agglutination → clogged vessels → haemolysis → free Hb → renal failure → death."},
{front:"Rh incompatibility in pregnancy?",back:"Rh– mother + Rh+ baby → mother makes anti-Rh antibodies → attacks future Rh+ babies (HDFN). Prevented with RhoGAM."},
{front:"Where are blood cells produced?",back:"Red bone marrow (haematopoiesis)."},
{front:"What carries dissolved nutrients, gases, waste?",back:"Plasma — the non-living fluid matrix of blood."},
{front:"Which cells produce antibodies?",back:"Lymphocytes (B-cells → plasma cells)."},
{front:"Total blood volume?",back:"4–6 litres (~8% of body weight)."}
],
questions:[
{q:"One regulatory function of blood is to",options:["take oxygen to cells","maintain blood pH","to take urea to the liver","reduce infections"],answer:1,explanation:"Maintaining blood pH is a regulatory function. Transporting O₂/urea = transport. Reducing infections = protection."},
{q:"The term thrombocyte refers to",options:["red blood cells","proteins in the plasma","white blood cells","platelets"],answer:3,explanation:"Thrombocytes are platelets — small cell fragments for blood clotting."},
{q:"The precursor to clotting fibres is a protein called",options:["fibroblast","collagen","fibrinogen","fibrin"],answer:2,explanation:"Fibrinogen is the soluble precursor converted into insoluble fibrin during coagulation."},
{q:"What is the primary function of the erythrocyte?",options:["haemostasis","transporting oxygen","making antibodies","fighting infection"],answer:1,explanation:"Erythrocytes transport oxygen (and some CO₂) via haemoglobin."},
{q:"Where are blood cells produced?",options:["the liver","the kidney","in bone marrow","the heart"],answer:2,explanation:"All blood cells are produced in red bone marrow (haematopoiesis)."},
{q:"Which structure contains dissolved useful or waste substances?",options:["WBC","plasma","thrombocytes","RBC"],answer:1,explanation:"Plasma carries dissolved nutrients, electrolytes, gases, and waste products."},
{q:"How long do RBCs last and where are they broken down?",options:["30 days, kidney","120 days, spleen","120 days, kidney","30 days, spleen"],answer:1,explanation:"RBCs live ~120 days and are broken down primarily in the spleen."},
{q:"Tamāra has tapeworm. A blood test would show increased",options:["Eosinophils","platelets","Neutrophils","Basophils"],answer:0,explanation:"Eosinophils combat parasitic infections like tapeworm."},
{q:"Samuel takes antihistamines for allergy. Which cells increased?",options:["Phagocytes","Basophils","Philrodpot","Neutrophils"],answer:1,explanation:"Basophils release histamine during allergic reactions. Antihistamines counteract this."},
{q:"The first stage of haemostasis is",options:["coagulation","vasopressin","vasodilation","vasoconstriction"],answer:3,explanation:"Vascular spasm (vasoconstriction) is stage 1 — the vessel constricts to reduce blood flow."},
{q:"Why are RBCs considered 'unselfish'?",options:["They reproduce to share O₂ transport.","They consume O₂ only for themselves.","They donate haemoglobin to WBCs.","They lack mitochondria so all O₂ goes to other cells."],answer:3,explanation:"No mitochondria = can't use O₂ themselves. All carried O₂ is delivered to other cells."},
{q:"Which blood group is the universal donor?",options:["AB","O+","O-","AB+"],answer:2,explanation:"O– has no A, B, or Rh antigens — safe for any recipient."},
{q:"Which blood group is the most 'selfish'?",options:["AB+","O+","A","AB-"],answer:0,explanation:"AB+ receives from anyone (universal recipient) but can only donate to AB+."},
{q:"Why do mature RBCs lack a nucleus?",options:["To increase energy production","To allow more haemoglobin storage","To prevent dividing","To make them more rigid"],answer:1,explanation:"No nucleus = more space for haemoglobin = maximum O₂-carrying capacity."},
{q:"What triggers erythropoiesis?",options:["High blood O₂","High platelets","Increased WBC count","Low tissue O₂ levels"],answer:3,explanation:"Hypoxia → kidneys release EPO → stimulates bone marrow → more RBCs."},
{q:"Albumin helps homeostasis by acting as",options:["an infection fighter","an eosinophil promoter","an oxygen transporter","a chemical sponge for H⁺ to maintain pH"],answer:3,explanation:"Albumin buffers pH by absorbing or releasing hydrogen ions."},
{q:"Blood pH range is",options:["7.3–7.4","6.35–7.35","7.35–7.45","6.9–7.1"],answer:2,explanation:"Blood pH is maintained at 7.35–7.45. Deviations are life-threatening."},
{q:"Cells that produce and release antibodies are",options:["Neutrophils","lymphocytes","thrombocytes","phagocytes"],answer:1,explanation:"Lymphocytes (B-cells → plasma cells) produce antibodies."},
{q:"Harley (Rh+) and Quinn (Rh–) want children. What complication?",options:["Unrelated genetic condition.","Child inherits Rh–, no complications.","Child may inherit Rh+, causing Rh incompatibility.","No Rh-related complications."],answer:2,explanation:"Rh+ child in Rh– mother → mother may produce anti-Rh antibodies → haemolytic disease in future pregnancies."},
{q:"Manu (type A) needs blood. Sister Jemima (type B) wants to donate.",options:["Manu can only receive from AB.","Safe because they're siblings.","Incompatible blood types — cannot donate.","Only if Rh factors match."],answer:2,explanation:"Type A has anti-B antibodies. Receiving type B → agglutination. Family relation is irrelevant."}
]},

{id:"integumentary",title:"Integumentary System",subtitle:"Skin, Hair, Nails & Glands",icon:"🧴",color:"#00695C",accentLight:"#B2DFDB",
notes:[
{heading:"Overview of the Integumentary System",
summary:["The integumentary system consists of: skin, hair, nails, sebaceous (oil) glands, and sudoriferous (sweat) glands.","Skin is the largest organ of the body — it covers the entire external surface.","Skin is like a cake: epidermis = icing (top), dermis = cake (middle), hypodermis = the stuff that sticks the cake to the board (bottom).","The hypodermis is also called the subcutaneous layer, superficial fascia, or fat layer."],
images:[{src:"images/skin-cross-section.jpg",caption:"Cross-section of skin showing all three layers and accessory structures (Pg 149)"}],
detailed:["The integumentary system is the body's outermost organ system and includes the skin itself along with its accessory structures: hair, nails, sebaceous glands, and sudoriferous glands. Together, these structures form a protective barrier between the body's internal environment and the outside world.","Skin is the largest organ of the body by surface area and weight. In an average adult it covers approximately 1.5–2 m² and weighs about 4–5 kg (roughly 7% of body weight). It varies in thickness from about 0.5 mm (eyelids) to 4 mm (soles of feet).","A helpful analogy from the lecture: skin is like a layered cake. The epidermis is the outermost layer — like the icing on top. The dermis is the middle layer — like the cake itself. The hypodermis (subcutaneous layer) sits deepest — like the base material you use to stick a cake onto a board to keep it from slipping. The hypodermis is sometimes called the subcutaneous layer, superficial fascia, or simply the fat layer because it is primarily composed of adipose tissue.","An interesting fact: a person sheds about 700g of skin per year. Over a lifetime, you'll shed the equivalent of your entire body weight in dead skin cells."]},
{heading:"Functions of Skin",
summary:["Protection — chemical (secretions, defensins, melanin), physical (keratinised cells, glycolipids), biological (macrophages).","Temperature regulation — vasodilation/vasoconstriction of dermal blood vessels + sweating.","Sensitivity — sensory receptors for touch, pressure, temperature, pain.","Excretion — limited waste products excreted in sweat.","Vitamin D synthesis — UV light converts precursor in skin to vitamin D₃.","Immunity — Langerhans cells and macrophages in dermis provide immune surveillance."],
detailed:["CHEMICAL PROTECTION: Skin secretions (sebum, sweat) create an acidic film on the surface called the acid mantle, which inhibits bacterial growth. Skin cells secrete human defensins — natural antibiotic peptides that kill bacteria. When skin is wounded, additional protective peptides are secreted to prevent infection. Melanin produced by melanocytes provides UV radiation protection by absorbing and scattering ultraviolet light, preventing DNA damage in deeper cells.","PHYSICAL PROTECTION: The outermost layer (stratum corneum) consists of dead, keratinised cells that form a tough, waterproof barrier. Glycolipids in the intercellular spaces between these cells prevent water loss and block entry of water-soluble substances.","BIOLOGICAL PROTECTION: Macrophages in the dermis and Langerhans cells in the epidermis act as sentinels of the immune system. They phagocytise (engulf) pathogens that breach the skin barrier and present antigens to activate the adaptive immune response.","TEMPERATURE REGULATION: When the body is too hot, dermal blood vessels dilate (vasodilation) to bring warm blood closer to the surface for heat loss, and eccrine sweat glands produce sweat that cools the body by evaporation. When too cold, blood vessels constrict (vasoconstriction) to conserve heat, and the arrector pili muscles contract causing piloerection (goosebumps) — trapping a layer of insulating air near the skin. Adipose tissue in the hypodermis provides insulation.","SENSITIVITY: The skin is richly supplied with sensory receptors. Meissner's corpuscles detect light touch, Pacinian corpuscles detect deep pressure and vibration, free nerve endings detect pain and temperature, and Merkel cells detect sustained pressure. This is why Juju's Pacinian corpuscles fire when she receives a firm hug.","EXCRETION: Small amounts of metabolic waste (urea, uric acid, ammonia) are eliminated through sweat, though this is a minor excretory pathway compared to the kidneys.","VITAMIN D SYNTHESIS: UV-B radiation striking the skin converts 7-dehydrocholesterol (a cholesterol derivative) into cholecalciferol (vitamin D₃). This is then modified by the liver and kidneys into its active form, calcitriol, which is essential for calcium absorption and bone health."]},
{heading:"Epidermis",
summary:["Stratified squamous epithelium — multiple layers of flat cells.","Four cell types: keratinocytes (keratin), melanocytes (melanin/UV protection), Merkel cells (touch receptors), Langerhans cells (immune/phagocytes from bone marrow).","Layers (deep to superficial): stratum basale → stratum spinosum → stratum granulosum → stratum lucidum (thick skin only) → stratum corneum.","Stratum basale: rapidly dividing stem cells (mitosis occurs here).","Stratum spinosum: pre-keratin filaments.","Stratum granulosum: organelles disintegrate, keratin granules form.","Stratum corneum: dead, keratinised cells with glycolipids — the tough outer barrier."],
images:[{src:"images/epidermis-layers.jpg",caption:"Layers of the epidermis — from stratum basale to stratum corneum (Pg 151)"}],
detailed:["The epidermis is the outermost layer of skin — avascular (no blood vessels), nourished by diffusion from the dermis. It is composed of stratified squamous epithelium, meaning multiple layers of increasingly flattened cells.","FOUR CELL TYPES: (1) Keratinocytes are the most abundant (90%). They produce keratin, a tough fibrous protein that provides structural strength and waterproofing. They arise from stem cells in the deepest layer and migrate upward, becoming progressively flattened and keratinised until they die and are shed from the surface. (2) Melanocytes are found in the stratum basale. They produce melanin, a brown-black pigment that absorbs UV radiation and protects the DNA of dividing keratinocytes. All people have roughly the same number of melanocytes — differences in skin colour result from the amount and type of melanin produced. (3) Merkel cells are located at the junction between the epidermis and dermis. They are associated with sensory nerve endings (Merkel discs) and function as touch receptors for fine, sustained pressure. (4) Langerhans cells originate from bone marrow and migrate to the epidermis. They are dendritic cells (immune cells) that phagocytise foreign antigens and present them to lymphocytes, forming a critical part of the skin's immune defence.","EPIDERMAL LAYERS (deep → superficial): Stratum basale (basal layer) — the deepest single layer, sitting on the basement membrane. Contains actively dividing stem cells (this is where mitosis occurs in the epidermis), melanocytes, and Merkel cells. Stratum spinosum (spiny layer) — several layers thick. Cells contain pre-keratin filaments (intermediate filaments) that begin providing structural integrity. Cells here also contain Langerhans cells. Stratum granulosum (granular layer) — 3–5 layers. Cells become flattened, organelles and nuclei begin to disintegrate. Cytoplasm fills with keratohyaline granules (help form keratin) and lamellated granules (release waterproofing lipids into extracellular space). Stratum lucidum (clear layer) — present only in thick skin (palms of hands, soles of feet). A few rows of flat, dead, translucent keratinocytes. Stratum corneum (horny layer) — the outermost 20–30 layers of dead, fully keratinised cells. Cells are flat, anucleate membranous sacs filled with keratin, cemented together by glycolipids. This layer is the primary physical barrier — waterproof, resistant to abrasion, and relatively impermeable to biological and chemical agents.","The entire journey from stratum basale to stratum corneum takes approximately 25–45 days. Cradle cap in babies results from overactive sebaceous glands causing thick, oily patches of dead skin on the scalp."]},
{heading:"Dermis",
summary:["Lies beneath the epidermis — tough, flexible connective tissue.","Two sublayers: papillary layer (superficial) and reticular layer (deep, 80% of dermal thickness).","Contains: collagen and elastin fibres, blood vessels, nerve fibres, sensory receptors, sweat glands, oil glands, hair follicles.","Papillary layer: areolar connective tissue, dermal papillae (form fingerprints), Meissner's corpuscles, free nerve endings.","Reticular layer: dense irregular connective tissue, Pacinian corpuscles, provides structural strength.","Collagen fibres bind water for skin hydration. Loss of collagen → wrinkles."],
images:[{src:"images/skin-layers-labeled.jpg",caption:"Detailed skin cross-section — epidermis, dermis, and hypodermis with all structures (Pg 149)"},{src:"images/dense-irregular-ct.jpg",caption:"Dense irregular connective tissue — the primary tissue type of the dermis"},{src:"images/skin-tissue-types.jpg",caption:"Tissue types found in skin — squamous cells, collagen fibres, neurons, adipocytes"}],
detailed:["The dermis is the 'middle layer' of skin — analogous to the cake itself in the cake analogy. It is composed of strong, flexible connective tissue, is well-vascularised, and houses most of the skin's accessory structures.","PAPILLARY LAYER: The superficial 20% of the dermis. Made of areolar (loose) connective tissue with thin collagen and elastin fibres. Contains an extensive capillary network that nourishes the epidermis (which has no blood supply of its own). Key features include: dermal papillae — finger-like projections that push up into the epidermis, creating dermal and epidermal ridges. On the hands and feet, these ridges form the unique patterns we know as fingerprints and toe prints (used for grip and identification). The papillary layer also contains Meissner's corpuscles (light touch receptors) and free nerve endings (pain and temperature).","RETICULAR LAYER: The deep 80% of the dermis. Composed of dense irregular connective tissue — primarily thick, irregularly arranged collagen fibres interspersed with some elastic fibres. This arrangement allows it to resist tension pulled in many directions, providing structural strength and resilience to the skin. It contains blood vessels, sweat and sebaceous glands, Pacinian corpuscles (deep pressure/vibration), hair follicles, and the arrector pili muscles.","COLLAGEN AND AGEING: Collagen fibres in the dermis bind water molecules, maintaining skin hydration and plumpness. They also provide tensile strength. With ageing, collagen production decreases, existing collagen cross-links and becomes less flexible, and elastin fibres lose their stretch. The result is wrinkles, sagging, and thinner skin. This is why the question about Anne's facial creases is answered by 'loss of collagen fibres within the dermis' — not loss of fat, muscle, or epidermal cells.","The dermis contains many cells involved in fighting infection, including macrophages, mast cells (similar to basophils — release histamine), and white blood cells that have migrated from the blood."]},
{heading:"Hypodermis (Subcutaneous Layer)",
summary:["Deepest layer — not technically part of the skin itself.","Primarily composed of adipose (fat) tissue.","Functions: anchors skin to underlying structures, insulation (conserves body heat), energy storage, shock absorption.","Thickness varies with body region, sex, nutritional status, and age.","Increases with weight gain — this is where most body fat is stored."],
images:[{src:"images/adipose-tissue.jpg",caption:"Adipose tissue — fat cells with nucleus pushed to side by large fat droplet"}],
detailed:["The hypodermis (also called the subcutaneous layer or superficial fascia) is the deepest layer associated with the skin, though technically it is not part of the skin itself. It attaches the skin to underlying bone and muscle while allowing the skin to slide relatively freely over these structures.","COMPOSITION: Primarily adipose tissue (fat) with some areolar connective tissue. The adipose tissue consists of adipocytes — cells that store large fat droplets, pushing their nucleus to one side of the cell.","FUNCTIONS: (1) Anchoring — connects the dermis to underlying muscles and bones. (2) Insulation — adipose tissue is a poor conductor of heat, so it helps retain body warmth. This is particularly important in cold environments. The Titanic reference from the lecture illustrates this: Jack's lack of adipose tissue contributed to his fatal hypothermia in the freezing water, while Rose's greater subcutaneous fat helped insulate her. (3) Energy storage — fat stored here serves as an energy reserve. (4) Shock absorption — the layer cushions and protects underlying structures from mechanical trauma.","CLINICAL RELEVANCE: The hypodermis thickens with weight gain, as excess energy is stored as fat in adipocytes. Its thickness varies significantly between body regions (thicker on abdomen and thighs, thinner on eyelids and dorsum of hands), between sexes (females tend to have thicker subcutaneous fat, particularly on hips and breasts), and with age (tends to thin in elderly, contributing to sensitivity to cold and increased bruising).","Subcutaneous injections are administered into this layer because it has good blood supply for drug absorption but fewer nerve endings than the dermis, making injections less painful."]},
{heading:"Sebaceous Glands (Oil Glands)",
summary:["Produce sebum (oil) that lubricates and waterproofs hair and skin.","Prevents skin from becoming brittle and slows water loss.","Sebum contains bactericidal substances — kills bacteria on skin surface.","Secretion increases significantly at puberty (hormonal influence).","Most are associated with hair follicles — secrete into the follicle."],
images:[{src:"images/sebaceous-eccrine-glands.jpg",caption:"Sectioned sebaceous gland and eccrine sweat gland (Pg 156)"}],
detailed:["Sebaceous glands are oil-producing glands found nearly everywhere on the skin (except palms and soles, which have no hair follicles). They are holocrine glands, meaning the entire secretory cell ruptures to release its product.","SEBUM: The oily secretion contains lipids, cholesterol, proteins, and cell fragments. Its functions include: (1) Lubricating the hair shaft and skin surface, keeping them soft and flexible. (2) Preventing the skin from becoming dry and brittle by forming a protective film. (3) Slowing water loss from the skin when humidity is low. (4) Bactericidal action — sebum contains substances that kill surface bacteria, contributing to the skin's chemical defence.","Most sebaceous glands are associated with hair follicles and secrete sebum into the follicular canal, from where it spreads onto the skin surface. Some specialised sebaceous glands open directly onto the skin surface (e.g. Meibomian glands in eyelids, which lubricate the eye surface).","Sebaceous gland activity is influenced by hormones, particularly androgens. Activity is low in childhood, increases dramatically at puberty (contributing to acne), remains high during adulthood, and decreases in old age (contributing to dry, itchy skin in the elderly). Cradle cap in newborns results from maternal hormones stimulating the baby's sebaceous glands, causing thick, oily patches of dead skin.","Acne vulgaris occurs when sebaceous glands become blocked and infected. Excess sebum and dead cells clog the follicle → comedone (blackhead/whitehead) → bacterial growth (Cutibacterium acnes) → inflammation → papules, pustules, or cysts."]},
{heading:"Sudoriferous Glands (Sweat Glands)",
summary:["Two types: eccrine and apocrine glands.","Eccrine glands: found all over body (especially palms, soles, forehead). Secrete acidic, watery sweat for cooling.","Apocrine glands: found in axillary and genital regions. Secrete viscous sweat with fatty acids and proteins.","Apocrine secretions are odourless — body odour comes from bacterial breakdown on skin surface."],
detailed:["Sudoriferous (sweat) glands are exocrine glands with two distinct types that differ in location, structure, and secretion.","ECCRINE (MEROCRINE) GLANDS: The most abundant type (3–4 million across the body). Found everywhere but particularly concentrated on palms, soles, and forehead. They are simple coiled tubular glands that open directly onto the skin surface through pores. Their primary function is thermoregulation — when body temperature rises, eccrine glands produce sweat (99% water with NaCl, urea, uric acid, ammonia, and lactic acid). Evaporation of this sweat from the skin surface cools the body. Eccrine sweat is acidic (pH 4–6), contributing to the acid mantle. They begin functioning at birth.","APOCRINE GLANDS: Larger than eccrine glands. Found mainly in the axillary (armpit) and anogenital regions. They are also coiled tubular glands but they secrete into hair follicles rather than directly onto the skin surface. Their secretion is more viscous and contains fatty acids, proteins, and lipids in addition to the components of eccrine sweat. Despite common belief, apocrine secretions are initially odourless — body odour results from bacteria on the skin surface breaking down the organic components of apocrine sweat into volatile, odoriferous compounds. Apocrine glands become active at puberty (under hormonal influence) and are stimulated by stress and sexual arousal.","OTHER SPECIALISED GLANDS: Ceruminous glands in the ear canal produce cerumen (earwax) — a mixture of sebum and modified sweat that protects the ear canal. Mammary glands are specialised sudoriferous glands that produce milk.","An amusing historical note from the lecture: in Elizabethan times, lovers exchanged 'love apples' — a woman would peel an apple, place the peelings in her armpit until they were saturated with perspiration, and then give the sweat-soaked apple to her lover to smell!"]},
{heading:"Hair",
summary:["Found everywhere except palms, soles, and lips.","Functions: protection, sensitivity (hair follicle receptors detect movement).","Hair is dead, keratinised cells. Shaft (above skin) and root (below skin).","Two types: terminal hair (thick, pigmented — scalp, eyebrows) and vellus hair (fine, pale — most of body).","Hair follicle produces hair cells. Hair bulb at base contains the matrix (growth zone).","Arrector pili muscle: smooth muscle attached to follicle — contracts to make hair stand up (goosebumps/piloerection)."],
images:[{src:"images/hair-cross-section.jpg",caption:"Hair structure — cross-section showing cuticle, cortex, medulla, and root sheaths (Pg 158)"},{src:"images/hair-follicle.jpg",caption:"Hair follicle longitudinal section showing all layers and the hair bulb (Pg 158)"}],
detailed:["Hair (pili) is a defining feature of mammals. Humans have about 5 million hairs, with approximately 100,000 on the scalp. Hair is found everywhere on the skin except the palms, soles, lips, nipples, and portions of the external genitalia.","STRUCTURE: Each hair consists of dead, keratinised cells produced by the hair follicle. The visible portion above the skin is the shaft; the portion embedded in the skin is the root. In cross-section, a hair has three layers: (1) the medulla — the central core (may be absent in fine hair), (2) the cortex — the middle layer forming the bulk of the hair, containing melanin granules that give hair its colour, and (3) the cuticle — the outermost layer of overlapping flat cells (like roof shingles) that protects the inner layers.","HAIR TYPES: Terminal hair is coarse, thick, and pigmented (scalp, eyebrows, eyelashes; after puberty — axillary, pubic, facial hair in males). Vellus hair is fine, pale, and short, covering most of the body ('peach fuzz').","HAIR FOLLICLE: A tube-like structure extending from the epidermal surface deep into the dermis (or even the hypodermis for scalp hairs). The hair bulb at the base of the follicle contains the hair matrix — actively dividing cells that produce the hair. A hair papilla (knot of capillaries) at the base provides nutrients. Melanocytes in the hair bulb add pigment to the growing hair.","ARRECTOR PILI MUSCLE: A small band of smooth muscle connecting the hair follicle to the papillary dermis. When it contracts (triggered by cold or fear), it pulls the hair follicle into a more upright position, causing the hair to 'stand on end' and creating a small bump on the skin surface — goosebumps (piloerection). In furry animals this traps more insulating air; in humans it is largely vestigial but is part of the body's response to cold (along with vasoconstriction).","HAIR GROWTH AND LOSS: Hair grows in cycles: anagen (active growth, 2–6 years for scalp), catagen (regression, 2–3 weeks), telogen (resting, 3 months, then shed). Scalp hair grows about 1 cm per month. Alopecia (hair loss) can result from genetics (androgenic alopecia/male pattern baldness), ageing, hormonal changes, stress, nutritional deficiencies, or autoimmune conditions."]},
{heading:"Nails",
summary:["Specialised region of the epidermis — made of hard, keratinised cells.","Parts: free edge, body (nail plate), proximal root (embedded in skin), nail bed (attached to epidermis beneath).","Nail matrix produces thick keratinised cells that form the nail — visible as the lunula (white crescent).","Functions: protection of fingertips and toes, aids fine manipulation, scratching.","Eponychium = cuticle (proximal fold of skin). Hyponychium = skin under free edge."],
images:[{src:"images/nail-structure.jpg",caption:"Nail anatomy — matrix, root, body, free edge, lunula, and surrounding folds (Pg 160)"}],
detailed:["Nails are scale-like modifications of the epidermis that form hard, protective coverings on the dorsal surfaces of the distal fingers and toes. Like hair, nails are composed of hard keratin produced by specialised epithelial cells.","STRUCTURE: The nail plate (body) is the visible hard portion. It appears pink because of the rich capillary bed in the nail bed beneath it. The free edge is the portion that extends beyond the fingertip. The nail root is the proximal portion embedded under the skin fold. The nail matrix is the growth zone — a thickened area of epithelium at the proximal end of the nail bed where mitosis occurs to produce the keratinised cells of the nail. The lunula is the whitish crescent visible at the base of the nail — it appears white because the thicker matrix region obscures the underlying capillaries.","SURROUNDING STRUCTURES: The eponychium (cuticle) is the fold of skin overlapping the proximal nail border. The hyponychium is the thickened skin beneath the free edge of the nail. Lateral nail folds border the sides of the nail.","GROWTH: Fingernails grow approximately 3–4 mm per month; toenails grow about 1 mm per month. Complete replacement of a fingernail takes 4–6 months; a toenail takes 12–18 months. Growth rate increases with age, is faster in summer than winter, and is faster on the dominant hand.","CLINICAL SIGNIFICANCE: Nail appearance can reflect overall health. Clubbing (bulging nails) may indicate chronic hypoxia (lung/heart disease). Spoon-shaped nails (koilonychia) can indicate iron-deficiency anaemia. Yellow nails may indicate fungal infection. White spots (leukonychia) are usually caused by minor trauma to the nail matrix. Blue-tinged nails (cyanosis) indicate poor oxygenation."]}
],
flashcards:[
{front:"What structures make up the integumentary system?",back:"Skin, hair, nails, sebaceous (oil) glands, and sudoriferous (sweat) glands."},
{front:"What are the three layers of skin (superficial to deep)?",back:"Epidermis (outermost), Dermis (middle), Hypodermis/subcutaneous layer (deepest — technically not part of skin itself)."},
{front:"Skin is like a cake — what does each part represent?",back:"Epidermis = icing (top layer)\nDermis = the cake itself (middle)\nHypodermis = the stuff sticking the cake to the board (bottom)"},
{front:"What are the 6 functions of skin?",back:"1. Protection (chemical, physical, biological)\n2. Temperature regulation\n3. Sensitivity (sensory receptors)\n4. Excretion (limited, via sweat)\n5. Vitamin D synthesis\n6. Immunity (macrophages, Langerhans cells)"},
{front:"What are the 3 types of skin protection?",back:"Chemical: acid mantle, defensins, melanin\nPhysical: keratinised cells, glycolipids\nBiological: macrophages, Langerhans cells"},
{front:"What are defensins?",back:"Natural antibiotic peptides secreted by skin cells that kill bacteria."},
{front:"What is the acid mantle?",back:"An acidic film on the skin surface (from sebum and sweat) that inhibits bacterial growth."},
{front:"Name the 4 cell types in the epidermis",back:"1. Keratinocytes (produce keratin — most abundant)\n2. Melanocytes (produce melanin — UV protection)\n3. Merkel cells (touch receptors)\n4. Langerhans cells (immune/phagocytes, from bone marrow)"},
{front:"Name the layers of the epidermis (deep to superficial)",back:"Stratum basale → stratum spinosum → stratum granulosum → stratum lucidum (thick skin only) → stratum corneum"},
{front:"Where does mitosis occur in the epidermis?",back:"In the stratum basale — the deepest layer containing rapidly dividing stem cells."},
{front:"What is the stratum corneum?",back:"The outermost layer of the epidermis — 20–30 layers of dead, keratinised cells with glycolipids. Forms the tough, waterproof barrier."},
{front:"What are the two sublayers of the dermis?",back:"Papillary layer (superficial 20% — areolar CT, dermal papillae, Meissner's corpuscles)\nReticular layer (deep 80% — dense irregular CT, Pacinian corpuscles)"},
{front:"What are dermal papillae and what do they create?",back:"Finger-like projections of the papillary dermis into the epidermis. They form the ridges we see as fingerprints and toe prints."},
{front:"What tissue type is the reticular layer of the dermis?",back:"Dense irregular connective tissue — collagen fibres in many directions, providing structural strength."},
{front:"What causes wrinkles/skin creases with ageing?",back:"Loss of collagen fibres within the dermis — they decrease, cross-link, and become less flexible with age."},
{front:"What is the hypodermis mainly composed of?",back:"Adipose tissue (fat). Functions: anchoring skin, insulation, energy storage, shock absorption."},
{front:"What do sebaceous glands produce and what does it do?",back:"Sebum (oil) — lubricates/waterproofs skin & hair, prevents brittleness, slows water loss, has bactericidal properties."},
{front:"What are the two types of sweat glands?",back:"Eccrine: watery, acidic sweat for cooling (all over body)\nApocrine: viscous sweat with proteins/fatty acids (axillary/genital areas)"},
{front:"Where are eccrine glands most concentrated?",back:"Palms of hands, soles of feet, and forehead."},
{front:"What causes body odour?",back:"Bacteria on the skin surface breaking down organic components of apocrine sweat — the sweat itself is initially odourless."},
{front:"What is hair made of?",back:"Dead, keratinised cells produced by the hair follicle."},
{front:"What is the arrector pili muscle?",back:"Smooth muscle attached to hair follicle — contracts to pull hair upright, causing goosebumps (piloerection). Helps with heat conservation."},
{front:"What does the nail matrix do?",back:"The growth zone of the nail — actively dividing cells here produce the hard keratinised cells that form the nail plate."},
{front:"What is the lunula?",back:"The white crescent at the base of the nail — the visible part of the nail matrix."},
{front:"What does melanin do?",back:"Protects skin cells by absorbing UV radiation, preventing DNA damage in deeper dividing cells."},
{front:"What are Meissner's corpuscles vs Pacinian corpuscles?",back:"Meissner's: in papillary dermis — detect light touch\nPacinian: in reticular dermis/hypodermis — detect deep pressure and vibration"},
{front:"What two responses help maintain temperature in the cold?",back:"Vasoconstriction (blood vessels narrow to conserve heat) and piloerection (hair stands up to trap insulating air)."},
{front:"What are Langerhans cells?",back:"Immune cells (dendritic cells) in the epidermis. Originate from bone marrow. Phagocytise pathogens and present antigens to lymphocytes."},
{front:"What is normal flora?",back:"Bacteria and fungi that live on and within the skin without causing disease — they're part of the skin's natural ecosystem."},
{front:"Which layer of skin receives the most nourishment?",back:"The dermis — it contains blood vessels. The epidermis is avascular and relies on diffusion from the dermis."},
{front:"Terminal vs vellus hair?",back:"Terminal: thick, pigmented (scalp, eyebrows, pubic)\nVellus: fine, pale, short ('peach fuzz' — most of body)"}
],
questions:[
{q:"Skin consists of",options:["dermis and subcutaneous fat","epidermis and dermis","epidermis, dermis and hypodermis","epidermis"],answer:1,explanation:"Skin proper consists of two layers: the epidermis and dermis. The hypodermis is associated with skin but is technically not part of it."},
{q:"The tissue that supports the dermis is called",options:["dense irregular connective tissue","dense regular connective tissue","smooth muscle","stratified squamous epithelium"],answer:0,explanation:"The dermis (especially the reticular layer) is composed of dense irregular connective tissue — collagen fibres arranged in many directions for strength."},
{q:"The looser tissue that anchors skin to the body while allowing it to slide freely is",options:["adipose tissue","stratified squamous epithelium","dense regular connective tissue","blood"],answer:0,explanation:"Adipose tissue in the hypodermis anchors the skin to underlying structures while allowing movement."},
{q:"Which layer of the skin receives the most nourishment?",options:["dermis","subcutaneous fat","epidermis and dermis","epidermis"],answer:0,explanation:"The dermis is well-vascularised (has blood vessels) so receives the most nourishment. The epidermis is avascular."},
{q:"Where in the epidermis does mitosis occur?",options:["dermis","stratum basale layer","stratum corneum","stratum spinosum"],answer:1,explanation:"The stratum basale is the deepest epidermal layer and contains the actively dividing stem cells."},
{q:"The outermost cells of the body are",options:["Melanocytes","Granulocytes","Langerhans cells","Keratinocytes"],answer:3,explanation:"Keratinocytes are the most abundant epidermal cells. The outermost layer (stratum corneum) is made entirely of dead, keratinised keratinocytes."},
{q:"The dermal papillae project up into the epidermis causing ridges known as",options:["pain receptors","corns","leather","finger and toe prints"],answer:3,explanation:"Dermal papillae create epidermal ridges that form the unique patterns of fingerprints and toe prints."},
{q:"The cells that help to protect the DNA inside skin cells are called",options:["melanocytes","Keratinocytes","haemocytes","melonspermā"],answer:0,explanation:"Melanocytes produce melanin, which absorbs UV radiation and protects the DNA of nearby cells from damage."},
{q:"The structures found in hairy places that produce sweat containing more protein and fatty substances are",options:["Apocrine glands","mammary glands","sebaceous glands","eccrine glands"],answer:0,explanation:"Apocrine glands (found in axillary and genital regions — hairy areas) produce a viscous sweat containing fatty acids and proteins."},
{q:"The skin and hair are soft, waterproof and non-brittle due to secretions from the",options:["sebaceous glands","ceruminous glands","sudoriferous glands","Apocrine glands"],answer:0,explanation:"Sebaceous glands secrete sebum (oil) that lubricates and waterproofs the skin and hair, preventing brittleness."},
{q:"The bacteria and fungi that live on and within the skin without causing disease are",options:["viruses","teleflora","normal flora","pathogenic flora"],answer:2,explanation:"Normal flora are the harmless microorganisms that naturally inhabit the skin surface."},
{q:"These natural antibiotics secreted by skin cells are called",options:["augmentin","acid mantle","melanin","defensins"],answer:3,explanation:"Defensins are antimicrobial peptides secreted by skin cells that kill bacteria — they are natural antibiotics."},
{q:"Which of the following is a function of skin?",options:["produces energy for the body","helps with making or synthesising vitamin D for the body","helps attach muscles to bones","stops our organs falling out"],answer:1,explanation:"Skin synthesises vitamin D when UV-B light converts a cholesterol precursor into vitamin D₃."},
{q:"Two ways the integumentary system helps maintain temperature in a cold environment",options:["shivering and vasoconstriction","shivering and piloerection","vasodilation and piloerection","vasoconstriction and piloerection"],answer:3,explanation:"In cold: vasoconstriction conserves heat by reducing blood flow to the skin surface, and piloerection (goosebumps) traps insulating air. (Shivering is a muscular response, not an integumentary function.)"},
{q:"Anne has developed creases in the skin due to the loss of",options:["skeletal muscle in her face","collagen fibres within the dermis","epithelial cells within the epidermis","adipose tissue"],answer:1,explanation:"Wrinkles/creases result from the loss and degradation of collagen fibres in the dermis with age."},
{q:"Juju feels a bit squashed from a firm hug because her",options:["chemoreceptors are triggered","pacinian corpuscles are triggered","thermoreceptors are triggered","photoreceptors are triggered"],answer:1,explanation:"Pacinian corpuscles detect deep pressure and vibration — they fire in response to the firm pressure of a hug."}
]},
