    const SRS_KEY = "srs_";
    function loadSrs(id) { try { const r = localStorage.getItem(SRS_KEY+id); return r ? JSON.parse(r) : null; } catch { return null; } }
    function saveSrs(id, d) { try { localStorage.setItem(SRS_KEY+id, JSON.stringify(d)); } catch {} }
    function initSrs(id, n) { const e = loadSrs(id); if (e && e.length === n) return e; return Array.from({length:n},(_,i)=>({index:i,box:0,lastSeen:0,correctStreak:0})); }
    function getDue(data) { const now=Date.now(), iv=[0,60000,300000,86400000]; return data.filter(c=>now-c.lastSeen>=iv[c.box]).sort((a,b)=>a.box-b.box||a.lastSeen-b.lastSeen); }
    const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

      rGot: { flex:1, padding:"14px", borderRadius:12, fontSize:"0.95rem", fontWeight:600, color:"#fff", border:"none" },
      done: { background:"var(--surface)", borderRadius:16, padding:32, boxShadow:"var(--shadow)", textAlign:"center" },
      doneT: { fontFamily:"'DM Serif Display',serif", fontSize:"1.5rem", fontWeight:400, marginBottom:12 },
      // quiz
      qCnt: { color:"var(--text-secondary)", fontSize:"0.9rem", fontWeight:500 },
      pTrack: { height:6, background:"var(--border)", borderRadius:3, marginBottom:20, overflow:"hidden" },
      pFill: { height:"100%", borderRadius:3, transition:"width 0.4s ease" },
      qCard: { background:"var(--surface)", borderRadius:16, padding:28, boxShadow:"var(--shadow)" },
      qTxt: { fontSize:"1.1rem", fontWeight:500, lineHeight:1.6, marginBottom:24 },
      opts: { display:"flex", flexDirection:"column", gap:10 },
      opt: { display:"flex", alignItems:"center", gap:12, padding:"14px 16px", borderRadius:12, border:"2px solid var(--border)", background:"var(--bg)", textAlign:"left", fontSize:"0.9rem" },
      optOk: { border:"2px solid #2E7D32", background:"#E8F5E9" },
      optNo: { border:"2px solid #C62828", background:"#FFEBEE" },
      optL: { width:30, height:30, borderRadius:8, background:"var(--border)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:"0.8rem", flexShrink:0 },
      optT: { flex:1, lineHeight:1.5 },
      chk: { color:"#2E7D32", fontWeight:700, fontSize:"1.1rem" },
      cross: { color:"#C62828", fontWeight:700, fontSize:"1.1rem" },
      expBox: { marginTop:20, padding:18, borderRadius:12, borderLeft:"4px solid" },
      // results
      resCard: { background:"var(--surface)", borderRadius:16, padding:32, boxShadow:"var(--shadow)", textAlign:"center" },
      resT: { fontFamily:"'DM Serif Display',serif", fontSize:"1.8rem", fontWeight:400, marginBottom:24 },
      sCirc: { position:"relative", width:120, height:120, margin:"0 auto 16px" },
      sOver: { position:"absolute", top:0, left:0, width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center" },
      sNum: { fontSize:"1.8rem", fontWeight:700 },
      sDetail: { fontSize:"1rem", color:"var(--text-secondary)", marginBottom:8 },
      sMsg: { fontSize:"1.05rem", marginBottom:24, fontWeight:500 },
      resActs: { display:"flex", gap:12, justifyContent:"center", marginBottom:20 },
      revTog: { background:"none", fontSize:"0.9rem", fontWeight:600, padding:"8px 16px" },
      revList: { marginTop:20, textAlign:"left", display:"flex", flexDirection:"column", gap:16 },
      revItem: { background:"var(--bg)", borderRadius:12, padding:18 },
      revQ: { display:"flex", gap:10, alignItems:"flex-start", marginBottom:8 },
      revBadge: { padding:"2px 10px", borderRadius:6, fontSize:"0.78rem", fontWeight:700, whiteSpace:"nowrap", flexShrink:0 },
      revQT: { fontSize:"0.9rem", fontWeight:500, lineHeight:1.5 },
      revA: { marginBottom:8, paddingLeft:52 },
      revE: { fontSize:"0.85rem", color:"var(--text-secondary)", lineHeight:1.6, paddingLeft:52 },
      foot: { textAlign:"center", padding:"32px 0", borderTop:"1px solid var(--border)", marginTop:32 },
      footT: { color:"var(--text-secondary)", fontSize:"0.85rem" },
    };

    // ═══════════════════════════════════════════════════════════
    // COMPONENTS
    // ═══════════════════════════════════════════════════════════

    function ProgressRing({percent,size=80,stroke=6,color}){
      const r=(size-stroke)/2,c=2*Math.PI*r,o=c-(percent/100)*c;
      return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.8s ease"}}/></svg>;
    }

    // ── Home ──
    function HomeView({topics,onStudy,onFlash,onQuiz}){
      return <div style={S.box}>
        <header style={S.heroWrap}>
          <div style={S.heroTag}>Health Science 1</div>
          <h1 style={S.heroH}>Continuous Test 2</h1>
          <p style={S.heroP}>Select a topic to review notes, drill flashcards, or test yourself</p>
        </header>
        {topics.map(t=><div key={t.id} style={{...S.card,borderTop:`4px solid ${t.color}`}}>
          <div style={S.icon}>{t.icon}</div>
          <h2 style={S.cardT}>{t.title}</h2>
          <p style={S.cardS}>{t.subtitle}</p>
          <div style={S.pills}>
            <span style={S.pill}>{t.notes.length} sections</span>
            <span style={S.pill}>{(t.flashcards||[]).length} cards</span>
            <span style={S.pill}>{t.questions.length} questions</span>
          </div>
          <div style={S.acts}>
            <button style={{...S.bp,background:t.color}} onClick={()=>onStudy(t)}>📖 Notes</button>
            <button style={{...S.bf,background:t.accentLight,color:t.color}} onClick={()=>onFlash(t)}>🃏 Cards</button>
            <button style={{...S.bs,color:t.color,borderColor:t.color}} onClick={()=>onQuiz(t)}>✏️ Quiz</button>
          </div>
        </div>)}
        <footer style={S.foot}><p style={S.footT}>To add new topics, edit the <code>TOPICS</code> array in <code>index.html</code></p></footer>
      </div>;
    }

    // ── Study ──
    function StudyView({topic,onBack,onQuiz}){
      const [sec,setSec]=useState(0);
      const ref=useRef(null);
      useEffect(()=>{if(ref.current)ref.current.scrollTo({top:0,behavior:"smooth"});},[sec]);
      return <div style={S.box}>
        <nav style={S.nav}>
          <button onClick={onBack} style={S.back}>← Back</button>
          <button onClick={onQuiz} style={{...S.bp,background:topic.color,padding:"8px 20px",fontSize:"0.85rem",flex:"none"}}>Take Quiz →</button>
        </nav>
        <div style={S.hdr}><span style={{fontSize:"2.5rem"}}>{topic.icon}</span><div><h1 style={S.hdrT}>{topic.title}</h1><p style={S.hdrS}>{topic.subtitle}</p></div></div>
        <div style={S.tabs}>{topic.notes.map((n,i)=><button key={i} onClick={()=>setSec(i)} style={{...S.tab,background:i===sec?topic.color:"transparent",color:i===sec?"#fff":"var(--text-secondary)",fontWeight:i===sec?600:400}}>{n.heading}</button>)}</div>
        <div ref={ref} style={S.noteBox}>
          <h2 style={{...S.noteH,color:topic.color}}>{topic.notes[sec].heading}</h2>
          {topic.notes[sec].content.map((p,i)=><div key={i} style={S.noteR}><div style={{...S.noteM,background:topic.accentLight,color:topic.color}}>{i+1}</div><p style={S.noteT}>{p}</p></div>)}
        </div>
        <div style={S.arrows}>
          <button disabled={sec===0} onClick={()=>setSec(sec-1)} style={{...S.arw,opacity:sec===0?0.3:1}}>← Previous</button>
          <span style={S.cnt}>{sec+1} / {topic.notes.length}</span>
          {sec<topic.notes.length-1?<button onClick={()=>setSec(sec+1)} style={S.arw}>Next →</button>:<button onClick={onQuiz} style={{...S.bp,background:topic.color,padding:"10px 24px",flex:"none"}}>Take Quiz →</button>}
        </div>
      </div>;
    }

    // ── Flashcards ──
    const BOX_LBL=["New","Learning","Reviewing","Mastered"];
    const BOX_CLR=["#78909C","#F57C00","#1565C0","#2E7D32"];

    function FlashView({topic,onBack}){
      const cards=topic.flashcards||[];
      const [srs,setSrs]=useState(()=>initSrs(topic.id,cards.length));
      const [due,setDue]=useState([]);
      const [ci,setCi]=useState(0);
      const [flip,setFlip]=useState(false);
      const [done,setDone]=useState(false);
      const [stats,setStats]=useState({seen:0,got:0,miss:0});

      useEffect(()=>{const d=getDue(srs);if(!d.length)setDone(true);else{setDue(d);setCi(0);setFlip(false);}},[]);

      const cur=due[ci], cc=cur?cards[cur.index]:null;
      const bc=[0,0,0,0]; srs.forEach(c=>bc[c.box]++);

      const rate=(ok)=>{
        const u=[...srs],c={...u[cur.index]};c.lastSeen=Date.now();
        if(ok){c.correctStreak++;c.box=Math.min(c.box+1,3);}else{c.correctStreak=0;c.box=Math.max(c.box-1,0);}
        u[cur.index]=c;setSrs(u);saveSrs(topic.id,u);
        setStats(p=>({seen:p.seen+1,got:ok?p.got+1:p.got,miss:ok?p.miss:p.miss+1}));
        if(ci+1>=due.length)setDone(true);else{setCi(ci+1);setFlip(false);}
      };
      const reset=()=>{
        const f=Array.from({length:cards.length},(_,i)=>({index:i,box:0,lastSeen:0,correctStreak:0}));
        setSrs(f);saveSrs(topic.id,f);const d=getDue(f);setDue(d);setCi(0);setFlip(false);setDone(false);setStats({seen:0,got:0,miss:0});
      };

      return <div style={S.box}>
        <nav style={S.nav}><button onClick={onBack} style={S.back}>← Back</button><span style={S.qCnt}>🃏 Flashcards</span></nav>
        <div style={S.hdr}><span style={{fontSize:"2.5rem"}}>{topic.icon}</span><div><h1 style={S.hdrT}>{topic.title}</h1><p style={S.hdrS}>{cards.length} flashcards · Spaced repetition</p></div></div>
        <div style={S.srsRow}>{BOX_LBL.map((l,i)=><div key={i} style={S.srsStat}><div style={{...S.srsNum,color:BOX_CLR[i]}}>{bc[i]}</div><div style={S.srsLbl}>{l}</div></div>)}</div>

        {done?<div style={S.done}>
          {stats.seen>0?<><div style={{fontSize:"2.5rem",marginBottom:12}}>🎉</div><h2 style={S.doneT}>Session Complete</h2><p style={{fontSize:"0.95rem",marginBottom:8}}>Cards reviewed: <strong>{stats.seen}</strong> · Got it: <strong style={{color:"#2E7D32"}}>{stats.got}</strong> · Needs work: <strong style={{color:"#C62828"}}>{stats.miss}</strong></p><p style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:24}}>Come back later to review cards as they become due again.</p></>:<><div style={{fontSize:"2.5rem",marginBottom:12}}>✅</div><h2 style={S.doneT}>No cards due right now</h2><p style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:24}}>All caught up! Cards will become due again based on your performance.</p></>}
          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={reset} style={{...S.bs,color:topic.color,borderColor:topic.color,flex:"none",padding:"12px 24px"}}>🔄 Reset All</button>
            <button onClick={onBack} style={{...S.bp,background:topic.color,flex:"none",padding:"12px 24px"}}>🏠 Home</button>
          </div>
        </div>:cc?<>
          <div style={S.pTrack}><div style={{...S.pFill,width:`${((ci+1)/due.length)*100}%`,background:topic.color}}/></div>
          <div style={{textAlign:"center",color:"var(--text-secondary)",fontSize:"0.85rem",marginBottom:16}}>Card {ci+1} of {due.length} due</div>
          <div onClick={()=>setFlip(!flip)} style={{...S.fc,borderColor:flip?topic.color:"var(--border)"}}>
            {!flip?<div style={S.fcIn}><div style={S.fcLbl}>Question</div><p style={S.fcTxt}>{cc.front}</p><div style={S.fcHint}>Tap to flip</div></div>
            :<div style={S.fcIn}><div style={{...S.fcLbl,color:topic.color}}>Answer</div><p style={S.fcTxt}>{cc.back.split("\n").map((l,i)=><span key={i}>{l}{i<cc.back.split("\n").length-1&&<br/>}</span>)}</p><div style={S.fcHint}>Tap to flip back</div></div>}
          </div>
          <div style={S.rRow}>
            <button onClick={e=>{e.stopPropagation();rate(false);}} style={S.rMiss}>✕ Needs Work</button>
            <button onClick={e=>{e.stopPropagation();rate(true);}} style={{...S.rGot,background:topic.color}}>✓ Got It</button>
          </div>
        </>:null}
      </div>;
    }

    // ── Quiz ──
    function QuizView({state,setState,onFinish,onBack}){
      const {topic,questions:qs,current:ci,answers:ans,showExplanation:se}=state;
      const q=qs[ci],sel=ans[ci],ha=sel!==undefined,ok=ha&&sel===q.answer,prog=((ci+1)/qs.length)*100;
      const pick=i=>{if(ha)return;const a=[...ans];a[ci]=i;setState({...state,answers:a,showExplanation:true});};
      const next=()=>{if(ci+1>=qs.length)onFinish();else setState({...state,current:ci+1,showExplanation:false});};
      return <div style={S.box}>
        <nav style={S.nav}><button onClick={onBack} style={S.back}>✕ Exit Quiz</button><span style={S.qCnt}>{ci+1} of {qs.length}</span></nav>
        <div style={S.pTrack}><div style={{...S.pFill,width:`${prog}%`,background:topic.color}}/></div>
        <div style={S.qCard}>
          <p style={S.qTxt}>{q.q}</p>
          <div style={S.opts}>{q.options.map((o,i)=>{
            let st={...S.opt};
            if(ha){if(i===q.answer)st={...st,...S.optOk};else if(i===sel&&!ok)st={...st,...S.optNo};else st={...st,opacity:0.5};}
            return <button key={i} onClick={()=>pick(i)} style={st} disabled={ha}>
              <span style={S.optL}>{String.fromCharCode(65+i)}</span><span style={S.optT}>{o}</span>
              {ha&&i===q.answer&&<span style={S.chk}>✓</span>}
              {ha&&i===sel&&!ok&&i!==q.answer&&<span style={S.cross}>✕</span>}
            </button>;
          })}</div>
          {se&&<div style={{...S.expBox,borderColor:ok?"#2E7D32":"#C62828",background:ok?"#E8F5E9":"#FFEBEE"}}>
            <div style={{fontWeight:700,marginBottom:6,color:ok?"#2E7D32":"#C62828",fontSize:"0.95rem"}}>{ok?"✓ Correct!":"✕ Incorrect"}</div>
            <p style={{margin:0,fontSize:"0.9rem",lineHeight:1.6,color:"#333"}}>{q.explanation}</p>
          </div>}
          {ha&&<button onClick={next} style={{...S.bp,background:topic.color,width:"100%",marginTop:16,padding:"14px"}}>{ci+1>=qs.length?"See Results":"Next Question →"}</button>}
        </div>
      </div>;
    }

    // ── Results ──
    function ResultsView({state,onRetry,onHome}){
      const {topic,questions:qs,answers:ans}=state;
      const cor=ans.filter((a,i)=>a===qs[i].answer).length,pct=Math.round((cor/qs.length)*100);
      const [sr,setSr]=useState(false);
      let msg="Keep studying — you'll get there! 💪";
      if(pct>=90)msg="Outstanding! You've mastered this topic! 🌟";else if(pct>=70)msg="Great work! Just a few gaps to fill. 👏";else if(pct>=50)msg="Good effort! Review the notes and try again. 📚";
      return <div style={S.box}><div style={S.resCard}>
        <h2 style={{...S.resT,color:topic.color}}>{topic.icon} Quiz Complete</h2>
        <div style={S.sCirc}><ProgressRing percent={pct} size={120} stroke={8} color={topic.color}/><div style={S.sOver}><span style={S.sNum}>{pct}%</span></div></div>
        <p style={S.sDetail}>{cor} out of {qs.length} correct</p>
        <p style={S.sMsg}>{msg}</p>
        <div style={S.resActs}>
          <button onClick={onRetry} style={{...S.bp,background:topic.color,flex:"none",padding:"12px 24px"}}>🔄 Retry Quiz</button>
          <button onClick={onHome} style={{...S.bs,flex:"none",padding:"12px 24px",borderColor:"var(--border)",color:"var(--text)"}}>🏠 Home</button>
        </div>
        <button onClick={()=>setSr(!sr)} style={{...S.revTog,color:topic.color}}>{sr?"Hide Review ▲":"Review Answers ▼"}</button>
        {sr&&<div style={S.revList}>{qs.map((q,i)=>{const w=ans[i]===q.answer;return <div key={i} style={{...S.revItem,borderLeft:`4px solid ${w?"#2E7D32":"#C62828"}`}}>
          <div style={S.revQ}><span style={{...S.revBadge,background:w?"#E8F5E9":"#FFEBEE",color:w?"#2E7D32":"#C62828"}}>{w?"✓":"✕"} Q{i+1}</span><span style={S.revQT}>{q.q}</span></div>
          {!w&&<div style={S.revA}><div style={{color:"#C62828",fontSize:"0.85rem"}}>Your answer: {q.options[ans[i]]}</div><div style={{color:"#2E7D32",fontSize:"0.85rem",fontWeight:600}}>Correct: {q.options[q.answer]}</div></div>}
          <p style={S.revE}>{q.explanation}</p>
        </div>;})}</div>}
      </div></div>;
    }

    // ── App ──
    function App(){
      const [view,setView]=useState("home");
      const [topic,setTopic]=useState(null);
      const [qs,setQs]=useState(null);
      const goHome=()=>{setView("home");setTopic(null);setQs(null);};
      const startQuiz=t=>{
        const sh=shuffle(t.questions).map(q=>{const oa=q.options[q.answer],so=shuffle(q.options);return{...q,options:so,answer:so.indexOf(oa)};});
        setQs({topic:t,questions:sh,current:0,answers:[],showExplanation:false});setView("quiz");
      };
      return <div style={S.app}>
        {view==="home"&&<HomeView topics={TOPICS} onStudy={t=>{setTopic(t);setView("study");}} onFlash={t=>{setTopic(t);setView("flash");}} onQuiz={startQuiz}/>}
        {view==="study"&&topic&&<StudyView topic={topic} onBack={goHome} onQuiz={()=>startQuiz(topic)}/>}
        {view==="flash"&&topic&&<FlashView topic={topic} onBack={goHome}/>}
        {view==="quiz"&&qs&&<QuizView state={qs} setState={setQs} onFinish={()=>setView("results")} onBack={goHome}/>}
        {view==="results"&&qs&&<ResultsView state={qs} onRetry={()=>startQuiz(qs.topic)} onHome={goHome}/>}
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
